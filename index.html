<script>
    async function simularCompilacaoGratis() {
        const promptText = document.getElementById('prompt').value.trim();
        if (!promptText) return alert("Por favor, descreva o seu projeto!");

        const output = document.getElementById('output');
        const btn = document.getElementById('btn-compilar');
        
        output.innerText = "[Honey IA] Conectando ao motor e gerando código...";
        btn.disabled = true;

        try {
            const response = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });

            const data = await response.json();
            if (data.sucesso) {
                output.innerText = data.codigo;
            } else {
                output.innerText = "[ERRO] " + (data.erro || "Falha ao compilar.");
            }
        } catch (err) {
            output.innerText = "[ERRO] Falha ao conectar com o motor da Honey IA.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
