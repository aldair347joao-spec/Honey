<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HONEY IA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        honeyYellow: '#FFC700',
                        honeyAmber: '#FF9900',
                        darkBg: '#090806'
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background-color: #090806; color: #FFFFFF; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; min-height: 100vh; }

        .ambient-glow {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 199, 0, 0.12) 0%, rgba(255, 153, 0, 0.02) 60%, transparent 100%);
            filter: blur(60px);
            pointer-events: none;
            z-index: 0;
        }

        .chat-input-box {
            background: rgba(18, 16, 12, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 199, 0, 0.25);
        }

        .text-gradient {
            background: linear-gradient(135deg, #FFFFFF 40%, #FFC700 80%, #FF9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative selection:bg-honeyYellow selection:text-black">

    <div class="ambient-glow"></div>

    <!-- CABEÇALHO -->
    <header class="relative z-10 w-full px-5 py-4 flex items-center justify-between max-w-xl mx-auto">
        <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
            
            <!-- ABELHA EM SVG REAL (SEM LINKS EXTERNOS, SEM ESTRELAS) -->
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-honeyYellow/20 to-honeyAmber/10 border border-honeyYellow/40 flex items-center justify-center shadow-[0_0_15px_rgba(255,199,0,0.2)]">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Corpo da Abelha -->
                    <ellipse cx="12" cy="13" rx="5" ry="6" fill="#FFC700" />
                    <!-- Listras da Abelha -->
                    <path d="M7.5 11H16.5" stroke="#090806" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M7.2 14H16.8" stroke="#090806" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M8.5 17H15.5" stroke="#090806" stroke-width="1.5" stroke-linecap="round"/>
                    <!-- Asas -->
                    <path d="M8 8.5C5.5 5.5 3.5 8 6.5 10.5L7.5 11" stroke="#FFC700" stroke-width="1.5" stroke-linecap="round" fill="rgba(255, 199, 0, 0.2)"/>
                    <path d="M16 8.5C18.5 5.5 20.5 8 17.5 10.5L16.5 11" stroke="#FFC700" stroke-width="1.5" stroke-linecap="round" fill="rgba(255, 199, 0, 0.2)"/>
                    <!-- Cabeça / Antenas -->
                    <circle cx="12" cy="6" r="2.5" fill="#FFC700" />
                    <path d="M11 4L9.5 2" stroke="#FFC700" stroke-width="1.2" stroke-linecap="round"/>
                    <path d="M13 4L14.5 2" stroke="#FFC700" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
            </div>

            <div class="flex flex-col">
                <span class="text-base font-black tracking-wider text-white leading-none">HONEY <span class="text-honeyYellow">IA</span></span>
                <span class="text-[9px] font-bold text-amber-400/80 tracking-widest uppercase mt-1">Enterprise Engine</span>
            </div>
        </div>

        <div class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-[11px] font-bold text-emerald-400 flex items-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
            <span>Ativo</span>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="relative z-10 flex-1 flex flex-col justify-center items-center px-4 py-2 w-full max-w-xl mx-auto">
        
        <!-- HERO -->
        <div id="hero-section" class="text-center space-y-3 mb-6">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-honeyYellow/10 border border-honeyYellow/30 text-honeyYellow text-[11px] font-bold tracking-wide">
                ⚡ Sistema Honey IA
            </div>
            
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight text-white leading-tight">
                Em que podemos <br/>
                <span class="text-gradient">avançar hoje?</span>
            </h1>
            
            <p class="text-xs text-gray-400 max-w-xs mx-auto font-medium leading-relaxed">
                Sistemas fullstack, gestão de marca, engenharia de prompts e automação instantânea.
            </p>
        </div>

        <!-- CAIXA DE MENSAGEM -->
        <div class="w-full">
            <form id="ai-form" class="chat-input-box rounded-2xl p-3">
                
                <div class="flex items-center justify-between pb-2 mb-2 border-b border-white/10 px-1">
                    <select id="mode-selector" class="bg-transparent text-honeyYellow text-xs font-bold focus:outline-none cursor-pointer">
                        <option value="dev" class="bg-[#12100C] text-white">⚡ Fullstack Dev</option>
                        <option value="designer" class="bg-[#12100C] text-white">🎨 Branding & Arte</option>
                        <option value="copy" class="bg-[#12100C] text-white">🎬 Roteiro de Vídeo</option>
                    </select>

                    <span class="text-[9px] text-gray-400 font-mono tracking-wider">HONEY-PRO v2.0</span>
                </div>

                <div class="flex items-center gap-2">
                    <label for="file-upload" class="p-2 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 cursor-pointer transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        <input type="file" id="file-upload" class="hidden">
                    </label>

                    <textarea 
                        id="prompt-input" 
                        rows="1" 
                        placeholder="Escreva a sua mensagem para a Honey IA..." 
                        class="w-full bg-transparent text-sm text-white placeholder-gray-500 focus:outline-none resize-none py-1 font-medium"
                    ></textarea>

                    <button 
                        type="submit" 
                        class="p-2.5 rounded-xl bg-gradient-to-r from-honeyYellow to-honeyAmber text-black font-extrabold flex items-center justify-center flex-shrink-0 shadow-[0_0_15px_rgba(255,199,0,0.3)] active:scale-95 transition"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                </div>
            </form>

            <!-- BUTTONS -->
            <div id="quick-chips" class="flex items-center justify-center gap-2 mt-3 flex-wrap">
                <button onclick="document.getElementById('prompt-input').value='Criar Landing Page para '; document.getElementById('prompt-input').focus();" class="px-3 py-1.5 rounded-xl bg-white/[0.04] hover:bg-honeyYellow/10 border border-white/10 hover:border-honeyYellow/30 text-gray-300 hover:text-honeyYellow text-xs font-semibold transition">
                    ⚡ Landing Page
                </button>
                <button onclick="document.getElementById('prompt-input').value='Conceito de Branding para '; document.getElementById('prompt-input').focus();" class="px-3 py-1.5 rounded-xl bg-white/[0.04] hover:bg-honeyYellow/10 border border-white/10 hover:border-honeyYellow/30 text-gray-300 hover:text-honeyYellow text-xs font-semibold transition">
                    🎨 Branding & Arte
                </button>
                <button onclick="document.getElementById('prompt-input').value='Escrever Roteiro de Vídeo sobre '; document.getElementById('prompt-input').focus();" class="px-3 py-1.5 rounded-xl bg-white/[0.04] hover:bg-honeyYellow/10 border border-white/10 hover:border-honeyYellow/30 text-gray-300 hover:text-honeyYellow text-xs font-semibold transition">
                    🎬 Roteiro de Vídeo
                </button>
            </div>
        </div>

    </main>

    <footer class="relative z-10 w-full py-3 text-center text-[10px] text-gray-500 font-medium">
        Honey IA © 2026 — Enterprise Engine
    </footer>

</body>
</html>
