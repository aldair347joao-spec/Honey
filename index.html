<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA 🐝</title>
    <!-- Tailwind CSS para um design moderno e responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f0f11;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- Cabeçalho / Header -->
    <header class="p-5 border-b border-gray-800 flex justify-between items-center bg-gray-900/50 backdrop-blur">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🐝</span>
            <h1 class="text-xl font-bold bg-gradient-to-r from-yellow-400 to-amber-500 bg-clip-text text-transparent">Honey IA</h1>
        </div>
        <span class="bg-green-500/10 text-green-400 text-xs px-3 py-1 rounded-full border border-green-500/20 font-medium">
            Versão Gratuita Ativa
        </span>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 max-w-lg mx-auto w-full">
        
        <!-- Secção de Introdução -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold mb-3">Bem-vindo à Honey IA</h2>
            <p class="text-gray-400 text-sm">A tua plataforma inteligente de compilações ilimitadas e gratuitas.</p>
        </div>

        <!-- Área de Interação / Gerador -->
        <div class="w-full bg-gray-950 border border-gray-800 rounded-2xl p-6 shadow-xl">
            <div class="space-y-4">
                <div>
                    <label for="prompt-input" class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Escreve a tua ideia ou comando:</label>
                    <textarea id="prompt-input" rows="4" class="w-full bg-gray-900 border border-gray-800 rounded-xl p-4 text-sm text-gray-100 placeholder-gray-600 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500 transition-all resize-none" placeholder="O que queres compilar hoje?..."></textarea>
                </div>

                <button id="generate-btn" class="w-full py-3.5 bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-500 hover:to-amber-600 text-gray-950 font-bold rounded-xl transition-all shadow-lg hover:shadow-yellow-500/10 flex items-center justify-center space-x-2">
                    <span>Compilar com Honey IA</span>
                    <span>⚡</span>
                </button>
            </div>

            <!-- Área do Resultado (Escondida por padrão) -->
            <div id="result-container" class="mt-6 p-4 bg-gray-900 rounded-xl border border-gray-800 hidden">
                <h4 class="text-xs font-bold uppercase tracking-wider text-yellow-500 mb-2">Resultado da Compilação:</h4>
                <div id="result-text" class="text-sm text-gray-300 whitespace-pre-line"></div>
            </div>
        </div>

    </main>

    <!-- Rodapé -->
    <footer class="p-6 text-center text-xs text-gray-600 border-t border-gray-900">
        <p>&copy; 2026 Honey IA. Todos os direitos reservados.</p>
    </footer>

    <!-- Script de Integração com o teu Backend -->
    <script>
        const generateBtn = document.getElementById('generate-btn');
        const promptInput = document.getElementById('prompt-input');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');

        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value.trim();
            if (!prompt) {
                alert('Por favor, escreve alguma coisa primeiro!');
                return;
            }

            // Mudar o estado do botão para carregamento
            generateBtn.disabled = true;
            generateBtn.innerHTML = `<span>A processar...</span> <span class="animate-spin">🌀</span>`;
            resultContainer.classList.add('hidden');

            try {
                // Faz a chamada para a tua API no backend (Render)
                const response = await fetch('/api/compile', { // Ajusta esta rota se o teu backend usar outro nome
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (response.ok) {
                    resultText.textContent = data.result || 'Compilação concluída!';
                    resultContainer.classList.remove('hidden');
                } else {
                    resultText.textContent = `Erro: ${data.error || 'Não foi possível processar.'}`;
                    resultContainer.classList.remove('hidden');
                }

            } catch (error) {
                console.error('Erro na requisição:', error);
                resultText.textContent = 'Erro ao conectar ao servidor. Tenta novamente!';
                resultContainer.classList.remove('hidden');
            } finally {
                // Restaurar o botão original
                generateBtn.disabled = false;
                generateBtn.innerHTML = `<span>Compilar com Honey IA</span> <span>⚡</span>`;
            }
        });
    </script>
</body>
</html>
