<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA — Inteligência Artificial de Alta Performance</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#fffbe1',
                            100: '#fff3b8',
                            400: '#facc15',
                            500: '#eab308',
                            600: '#ca8a04',
                        },
                        dark: {
                            bg: '#0a0b0f',
                            card: 'rgba(18, 20, 29, 0.7)',
                            border: 'rgba(255, 255, 255, 0.08)',
                        }
                    },
                    boxShadow: {
                        '3d-gold': '0 20px 40px -15px rgba(234, 179, 8, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3)',
                        '3d-card': '0 30px 60px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05)',
                        'glow': '0 0 50px -10px rgba(234, 179, 8, 0.25)'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #0a0b0f;
            color: #f3f4f6;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(234, 179, 8, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(202, 138, 4, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Efeito Glassmorphism com Efeito 3D */
        .glass-panel {
            background: rgba(15, 17, 26, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-button {
            background: linear-gradient(135deg, #facc15 0%, #ca8a04 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 20px 35px -10px rgba(234, 179, 8, 0.4);
        }

        /* Animação suave para mensagens */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(10, 11, 15, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(234, 179, 8, 0.4);
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- Cabeçalho Topo (Header) -->
    <header class="sticky top-0 z-50 w-full glass-panel border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            
            <!-- Logo com Efeito 3D e Gradiente -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-brand-600 to-brand-400 flex items-center justify-center shadow-3d-gold">
                    <i data-lucide="sparkles" class="w-5 h-5 text-black"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-200 to-brand-400">
                        Honey IA
                    </span>
                    <span class="text-[10px] text-gray-400 tracking-wider uppercase font-semibold">Pro Enterprise</span>
                </div>
            </div>

            <!-- Botões / Status no Topo -->
            <div class="flex items-center gap-4">
                <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-xs text-gray-300">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Sistemas operacionais
                </div>
                
                <button class="flex items-center gap-2 text-xs font-semibold px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 transition">
                    <i data-lucide="crown" class="w-4 h-4 text-brand-400"></i>
                    <span>Utilizador Pro</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Área Principal de Chat -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 flex flex-col justify-between gap-6">
        
        <!-- Boas-vindas / Cabeçalho da Conversa (Desaparece quando inicia a conversa) -->
        <div id="welcome-section" class="text-center py-8 space-y-3 animate-fade-in">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-400 text-xs font-medium">
                <i data-lucide="zap" class="w-3.5 h-3.5"></i> Inteligência Multimodal Ativa
            </div>
            <h1 class="text-3xl md:text-5xl font-extrabold text-white tracking-tight">
                Em que posso ajudar hoje?
            </h1>
            <p class="text-sm md:text-base text-gray-400 max-w-lg mx-auto">
                Analise documentos, imagens, contratos ou faça perguntas complexas em segundos.
            </p>
        </div>

        <!-- Contentor de Mensagens do Chat -->
        <div id="chat-container" class="flex-1 space-y-4 overflow-y-auto min-h-[300px] max-h-[60vh] pr-2">
            <!-- As mensagens serão inseridas aqui via JavaScript -->
        </div>

        <!-- Área de Entrada de Dados (Input 3D Glassmorphism) -->
        <div class="sticky bottom-4 w-full">
            <form id="chat-form" class="glass-panel rounded-2xl p-3 shadow-3d-card relative flex flex-col gap-3 border border-white/10">
                
                <!-- Pré-visualização do Ficheiro Anexado -->
                <div id="file-preview-container" class="hidden items-center justify-between bg-white/5 p-2 px-3 rounded-xl border border-white/10">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i data-lucide="file-text" class="w-5 h-5 text-brand-400 flex-shrink-0"></i>
                        <span id="file-preview-name" class="text-xs text-gray-200 truncate font-medium">documento.pdf</span>
                    </div>
                    <button type="button" id="remove-file-btn" class="p-1 hover:bg-white/10 rounded-lg text-gray-400 hover:text-white transition">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>

                <!-- Campo de Texto Principal -->
                <div class="flex items-center gap-3">
                    <!-- Botão de Anexo -->
                    <label for="file-input" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 hover:text-white cursor-pointer transition flex-shrink-0">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                        <input type="file" id="file-input" class="hidden" accept="image/*,.pdf,.doc,.docx,.xlsx,.xls,.csv">
                    </label>

                    <!-- Textarea -->
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        placeholder="Escreva a sua mensagem ou anexe um documento..." 
                        class="w-full bg-transparent text-sm text-white placeholder-gray-500 focus:outline-none resize-none max-h-32 py-1.5"
                    ></textarea>

                    <!-- Botão de Enviar -->
                    <button 
                        type="submit" 
                        id="send-btn" 
                        class="glass-button p-3 rounded-xl text-black font-bold flex items-center justify-center shadow-3d-gold flex-shrink-0"
                    >
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>
            <div class="text-center mt-2">
                <span class="text-[11px] text-gray-500">Honey IA v2.5 Enterprise — Processamento ultra-rápido</span>
            </div>
        </div>

    </main>

    <!-- Lógica de Frontend -->
    <script>
        // Inicializar Ícones Lucide
        lucide.createIcons();

        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const welcomeSection = document.getElementById('welcome-section');
        const filePreviewContainer = document.getElementById('file-preview-container');
        const filePreviewName = document.getElementById('file-preview-name');
        const removeFileBtn = document.getElementById('remove-file-btn');

        let currentFileBase64 = null;
        let currentFileMimeType = null;

        // Ajustar altura da textarea automaticamente
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        });

        // Lidar com seleção de ficheiros
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFileMimeType = file.type;
                filePreviewName.textContent = file.name;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentFileBase64 = event.target.result.split(',')[1];
                    filePreviewContainer.classList.remove('hidden');
                    filePreviewContainer.classList.add('flex');
                };
                reader.readAsDataURL(file);
            }
        });

        // Remover ficheiro anexado
        removeFileBtn.addEventListener('click', () => {
            currentFileBase64 = null;
            currentFileMimeType = null;
            fileInput.value = '';
            filePreviewContainer.classList.add('hidden');
            filePreviewContainer.classList.remove('flex');
        });

        // Adicionar mensagens à interface
        function appendMessage(role, text) {
            welcomeSection.classList.add('hidden');

            const isUser = role === 'user';
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex gap-3 ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;

            const bubble = document.createElement('div');
            bubble.className = isUser 
                ? 'bg-brand-500/20 border border-brand-500/30 text-white p-4 rounded-2xl max-w-[85%] text-sm shadow-sm'
                : 'glass-panel text-gray-100 p-4 rounded-2xl max-w-[85%] text-sm border border-white/10 shadow-3d-card';

            bubble.innerHTML = text.replace(/\n/g, '<br>');
            msgDiv.appendChild(bubble);
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Submissão do Formulário
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();

            if (!text && !currentFileBase64) return;

            // Mostrar mensagem do utilizador
            let userDisplay = text;
            if (currentFileBase64 && !text) {
                userDisplay = "📎 [Documento Anexado]";
            }
            appendMessage('user', userDisplay);

            // Guardar dados atuais antes do reset
            const payload = {
                prompt: text,
                anexoBase64: currentFileBase64,
                mimeType: currentFileMimeType
            };

            // Limpar inputs
            userInput.value = '';
            userInput.style.height = 'auto';
            removeFileBtn.click();

            // Mensagem de a carregar (Skeleton/Loader)
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'flex gap-3 justify-start animate-fade-in';
            loadingDiv.innerHTML = `
                <div class="glass-panel text-brand-400 p-4 rounded-2xl text-sm border border-white/10 flex items-center gap-2">
                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                    <span>A analisar dados com a Honey IA...</span>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/gerar-gratis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                loadingDiv.remove();

                if (data.sucesso) {
                    appendMessage('assistant', data.resposta);
                } else {
                    appendMessage('assistant', `⚠️ Ops: ${data.erro}`);
                }

            } catch (err) {
                loadingDiv.remove();
                appendMessage('assistant', '⚠️ Não foi possível conectar ao servidor. Verifica a ligação.');
            }
        });
    </script>
</body>
</html>
