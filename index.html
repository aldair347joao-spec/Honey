<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA | Espaço de Trabalho</title>
    <style>
        :root { --gold: #ffb700; --bg: #050508; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .box { background: #111116; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; border: 1px solid #222; text-align: center; }
        h1 { color: var(--gold); margin-bottom: 5px; }
        textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #050508; color: #fff; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; font-family: inherit; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        button:hover { background: #e0a100; }
        button:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        pre { background: #000; padding: 15px; border-radius: 8px; text-align: left; overflow-x: auto; max-height: 300px; font-size: 13px; border: 1px solid #222; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="margin: 0; text-align: left;">Honey IA 🐝</h1>
    <p style="color: #888; text-align: left; margin-bottom: 15px;">Insira a sua ideia abaixo para gerar código limpo automaticamente.</p>
    
    <textarea id="prompt" rows="6" placeholder="Descreva o site ou a aplicação que pretende criar..."></textarea>
    <button id="btn-compilar" onclick="simularCompilacaoGratis()">Compilar com Honey IA</button>
    
    <h4 style="text-align: left; margin-bottom: 5px; color: var(--gold);">Resultado da Compilação:</h4>
    <pre id="output">Aguardando comandos...</pre>
</div>

<script>
    async function simularCompilacaoGratis() {
        const promptText = document.getElementById('prompt').value.trim();
        if (!promptText) return alert("Por favor, descreva o seu projeto!");

        const output = document.getElementById('output');
        const btn = document.getElementById('btn-compilar');
        
        output.innerText = "[Honey IA] Conectando ao motor e gerando código...";
        btn.disabled = true;

        try {
            const response = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });

            const data = await response.json();
            
            if (response.ok && data.sucesso) {
                output.innerText = data.codigo;
            } else {
                output.innerText = "[ERRO DO MOTOR] " + (data.erro || "Falha ao compilar o prompt.");
            }
        } catch (err) {
            output.innerText = "[ERRO DE CONEXÃO] Não foi possível comunicar com o servidor da Honey IA.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
