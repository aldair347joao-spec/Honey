<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA | Elite Premium Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffb700; --gold-dark: #cc9200; --bg: #060609; --card: #0f0f16; --border: #1a1a26; --preview-bg: #14141f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; width: 100vw; }
        
        /* Layout Principal - Padrão: Apenas o Chat ocupa tudo */
        .app-layout { 
            display: grid; 
            grid-template-columns: 1fr; 
            width: 100%; 
            height: 100%; 
        }
        
        /* Quando ativo em computadores/tablets: Divide 50% / 50% na Vertical */
        @media (min-width: 801px) {
            .app-layout.split-active { 
                grid-template-columns: 1fr 1fr; /* Esquerda: Sandbox | Direita: Chat */
            }
        }

        /* LADO ESQUERDO: Painel Sandbox (Oculto por padrão no arranque) */
        .sandbox-section { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            background: var(--preview-bg); 
            overflow: hidden; 
            position: relative; 
            width: 100%;
        }

        /* Ativa a exibição da sandbox quando a classe split-active for disparada */
        .app-layout.split-active .sandbox-section {
            display: flex; 
            animation: slideInLeft 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        /* LADO DIREITO: Secção do Chat e Conversa */
        .chat-section { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            position: relative; 
            background: var(--bg);
            overflow: hidden;
            width: 100%;
        }
        .app-layout.split-active .chat-section {
            border-left: 1px solid var(--border); 
        }
        
        #welcome-screen { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 100px); background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; transition: opacity 0.5s ease, visibility 0.5s; text-align: center; padding: 20px; }
        .hero-bee { font-size: 60px; animation: float 3s ease-in-out infinite; margin-bottom: 20px; display: inline-block; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        #welcome-screen h1 { font-size: 34px; color: var(--gold); margin-bottom: 12px; font-weight: 600; letter-spacing: -1px; }
        #welcome-screen p { color: #8a8a9e; max-width: 420px; font-size: 14px; line-height: 1.6; font-weight: 300; }

        .chat-container { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; width: 100%; max-width: 680px; margin: 0 auto; scroll-behavior: smooth; padding-bottom: 120px; }
        
        .message { display: flex; flex-direction: column; width: fit-content; max-width: 85%; padding: 15px 20px; border-radius: 20px; line-height: 1.6; font-size: 14px; animation: fadeIn 0.3s ease; position: relative; word-wrap: break-word; white-space: pre-wrap; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; box-shadow: 0 4px 15px rgba(255,183,0,0.15); }
        .honey-msg { background: var(--card); color: #e4e4ed; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        
        .msg-text { width: 100%; display: block; }

        /* Botões Premium */
        .btn-group { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .premium-btn { background: rgba(255, 183, 0, 0.06); border: 1px solid rgba(255, 183, 0, 0.15); color: var(--gold); cursor: pointer; display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: 500; gap: 6px; transition: all 0.2s; }
        .premium-btn:hover { background: rgba(255, 183, 0, 0.15); border-color: var(--gold); transform: translateY(-1px); }
        .visualize-btn { background: rgba(0, 230, 118, 0.08); border-color: rgba(0, 230, 118, 0.2); color: #00e676; }
        .visualize-btn:hover { background: rgba(0, 230, 118, 0.2); border-color: #00e676; }

        /* Zona de Input Dinâmica */
        .input-area { position: absolute; bottom: 20px; left: 0; width: 100%; padding: 0 20px; display: flex; justify-content: center; z-index: 5; background: transparent; }
        .input-wrapper { width: 100%; max-width: 600px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; padding: 8px 14px; box-shadow: 0 12px 30px rgba(0,0,0,0.5); transition: all 0.2s; gap: 6px; }
        .input-wrapper:focus-within { border-color: var(--gold); box-shadow: 0 12px 35px rgba(255,183,0,0.05); }
        
        .chat-input { flex: 1; background: none; border: none; padding: 8px 6px; color: #fff; font-size: 15px; outline: none; min-width: 0; }
        .chat-input::placeholder { color: #4e4e66; }
        
        .action-btn { background: none; border: none; color: #73738c; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .action-btn:hover { color: var(--gold); background: rgba(255, 183, 0, 0.08); }
        .send-btn { background: var(--gold); color: #000; }
        .send-btn:hover { background: var(--gold-dark); transform: scale(1.04); }
        .send-btn:disabled { background: #181824; color: #4e4e66; cursor: not-allowed; transform: none; }
        .recording { animation: pulse 1.2s infinite; color: #ff4a4a !important; background: rgba(255, 74, 74, 0.12) !important; border: 1px solid rgba(255, 74, 74, 0.25); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); opacity: 0.9; } }

        /* Top Bar Navegador Premium */
        .sandbox-header { height: 50px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        .browser-dots { display: flex; gap: 6px; align-items: center; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .browser-address { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 5px 15px; font-size: 11px; color: #8a8a9e; width: 50%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 300; }
        
        .sandbox-body { flex: 1; width: 100%; height: calc(100% - 50px); background: #14141f; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .sandbox-iframe { width: 100%; height: 100%; border: none; background: #ffffff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* RESPONSIVIDADE PARA TELEMÓVEIS (Evita que o layout quebre ou se sobreponha) */
        @media (max-width: 800px) {
            .app-layout.split-active { 
                grid-template-columns: 1fr; 
                grid-template-rows: 1fr 1fr; /* Divide meio a meio na horizontal: Topo=Preview, Baixo=Chat */
            }
            .app-layout.split-active .chat-section { 
                border-left: none; 
                border-top: 2px solid var(--border); 
            }
            .browser-address { width: 40%; }
        }
    </style>
</head>
<body>

    <div class="app-layout" id="main-layout">
        <!-- LADO ESQUERDO: Visualizador Sandbox Live -->
        <div class="sandbox-section" id="sandbox-panel">
            <div class="sandbox-header">
                <div class="browser-dots">
                    <div class="dot"></div>
                    <div class="dot yellow"></div>
                    <div class="dot green"></div>
                </div>
                <div class="browser-address" id="live-url">honey-ia://live-preview-premium</div>
                <button class="premium-btn" onclick="fecharSandbox()" style="padding: 5px 10px; border-radius: 8px; font-size: 11px; border-color: rgba(255,74,74,0.3); color: #ff4a4a; background: rgba(255,74,74,0.05);">Ocultar</button>
            </div>
            <div class="sandbox-body">
                <iframe class="sandbox-iframe" id="sandbox-preview" sandbox="allow-scripts"></iframe>
            </div>
        </div>

        <!-- LADO DIREITO: Chat e Entrada de Mensagem -->
        <div class="chat-section" id="chat-area">
            <div id="welcome-screen">
                <span class="hero-bee">🐝</span>
                <h1>Honey IA</h1>
                <p>A tua arquiteta digital. Crie aplicações, websites ou explore ideias incríveis com uma execução premium.</p>
            </div>

            <div class="chat-container" id="chat-box"></div>

            <div class="input-area" id="input-zone">
                <div class="input-wrapper">
                    <button class="action-btn" id="mic-btn" onclick="alternarGravacao()" title="Conversar por voz">
                        <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.61V21h2v-3.39c3.28-.41 6-3.19 6-6.61h-1.7z"/></svg>
                    </button>
                    <input type="text" class="chat-input" id="user-input" placeholder="Peça um site, app ou faça uma pergunta..." onkeypress="verificarTeclado(event)">
                    <button class="action-btn send-btn" id="send-btn" onclick="enviarMensagem()" title="Enviar">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

<script>
    const mainLayout = document.getElementById('main-layout');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const micBtn = document.getElementById('mic-btn');
    const sandboxIframe = document.getElementById('sandbox-preview');

    let reconhecimentoVoz;
    let estaGravando = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        reconhecimentoVoz = new SpeechRecognition();
        reconhecimentoVoz.continuous = false;
        reconhecimentoVoz.interimResults = false;

        reconhecimentoVoz.onresult = (event) => {
            const textoDitado = event.results[0][0].transcript;
            if(textoDitado.trim() !== "") {
                userInput.value = textoDitado;
                enviarMensagem();
            }
        };
        reconhecimentoVoz.onend = () => {
            estaGravando = false;
            micBtn.classList.remove('recording');
        };
    }

    function alternarGravacao() {
        if (!reconhecimentoVoz) return alert("Microfone indisponível.");
        if (estaGravando) { reconhecimentoVoz.stop(); } 
        else {
            estaGravando = true;
            micBtn.classList.add('recording');
            reconhecimentoVoz.start();
        }
    }

    function detectarIdiomaTexto(texto) {
        const txt = texto.toLowerCase();
        if (txt.match(/hello|thank you|i am/i)) return 'en-US';
        if (txt.match(/hola|gracias/i)) return 'es-ES';
        if (txt.match(/bonjour|merci/i)) return 'fr-FR';
        return 'pt-PT'; 
    }

    function falarTexto(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let textoLimpo = texto.replace(/```[\s\S]*?```/g, '[Código omitido na leitura]');
            textoLimpo = textoLimpo.replace(/[`*#\[\]\-\{\}\(\)\<\>]/g, ' ').trim();

            const fala = new SpeechSynthesisUtterance(textoLimpo);
            const idioma = detectarIdiomaTexto(textoLimpo);
            fala.lang = idioma;

            let vozes = window.speechSynthesis.getVoices();
            let voz = vozes.find(v => v.lang.toLowerCase().includes(idioma.split('-')[0]));
            if (voz) fala.voice = voz;

            window.speechSynthesis.speak(fala);
        }
    }

    function verificarTeclado(event) { if (event.key === 'Enter') enviarMensagem(); }

    function efeitoDigitarAoVivo(containerTexto, texto, callback) {
        let i = 0;
        containerTexto.textContent = ""; 
        function digitar() {
            if (i < texto.length) {
                containerTexto.textContent += texto.charAt(i);
                i++;
                chatBox.scrollTop = chatBox.scrollHeight;
                setTimeout(digitar, 4); 
            } else { if(callback) callback(); }
        }
        digitar();
    }

    function extrairCodigoHTML(texto) {
        const match = texto.match(/```html([\s\S]*?)
