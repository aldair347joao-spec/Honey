<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HONEY IA — Inteligência Estratégica</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        honeyGold: '#F59E0B',
                        honeyYellow: '#FBBF24',
                        honeyDark: '#12110E',
                        honeyCard: '#1A1814'
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #0A0907;
            color: #F3F4F6; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-y: scroll; /* Permite scroll nativo mas escondemos a barra */
            min-height: 100vh;
            /* Esconde a barra de scroll visualmente, mas mantém a funcionalidade */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        body::-webkit-scrollbar { display: none; } /* Chrome, Safari and Opera */

        .ambient-glow {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.07) 0%, transparent 70%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .chat-box {
            background-color: #171512;
            border: 1px solid rgba(245, 158, 11, 0.2);
            transition: all 0.25s ease;
        }

        .chat-box:focus-within {
            border-color: rgba(245, 158, 11, 0.5);
        }

        .text-gradient {
            background: linear-gradient(135deg, #FFFFFF 30%, #FBBF24 80%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .suggestion-pill {
            background-color: #171512;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .suggestion-pill:hover {
            background-color: #24211C;
            border-color: rgba(245, 158, 11, 0.3);
            color: #FBBF24;
        }

        /* Área de conversação principal */
        #chat-container {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 768px; /* max-w-2xl */
            margin: 0 auto;
            padding-top: 2rem;
            padding-bottom: 10rem; /* Espaço para o input fixo */
        }

        .message-user {
            align-self: flex-end;
            max-width: 85%;
            background-color: #1A1814;
            color: #F3F4F6;
            border: 1px solid rgba(245, 158, 11, 0.15);
            padding: 1rem 1.25rem;
            border-radius: 1.25rem 1.25rem 0.25rem 1.25rem;
            font-size: 0.95rem;
        }

        .message-ai {
            align-self: flex-start;
            max-width: 92%;
            background-color: #171512;
            color: #E5E7EB;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.5rem;
            border-radius: 1.25rem 1.25rem 1.25rem 0.25rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Estilização do Markdown gerado pela IA */
        .message-ai h2, .message-ai h3 { color: #FBBF24; font-weight: 700; margin-top: 1rem; margin-bottom: 0.5rem; }
        .message-ai p { margin-bottom: 0.75rem; }
        .message-ai ul, .message-ai ol { padding-left: 1.5rem; margin-bottom: 0.75rem; list-style: disc; }
        .message-ai blockquote { border-left: 3px solid #F59E0B; padding-left: 1rem; color: #FDE68A; margin: 1rem 0; font-style: italic; background: rgba(245,158,11,0.05); padding-top: 0.5rem; padding-bottom: 0.5rem; border-radius: 0 0.5rem 0.5rem 0;}
        .message-ai table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.85rem; }
        .message-ai th, .message-ai td { border: 1px solid rgba(255,255,255,0.1); padding: 0.5rem; text-align: left; }
        .message-ai th { background-color: #24211C; color: #FBBF24; }
        .message-ai code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.85rem; color: #FBBF24; }

        .file-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #FBBF24;
            margin-bottom: 0.5rem;
        }

        /* Input Container Fixo */
        #input-section {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, #0A0907 80%, transparent);
            padding-bottom: 1.5rem;
            padding-top: 1rem;
            z-index: 30;
            pointer-events: none; /* Permite clicar através do gradiente */
        }

        #ai-form, #suggestion-chips {
            pointer-events: auto; /* Reativa cliques nos elementos */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative selection:bg-amber-500 selection:text-black">

    <div class="ambient-glow"></div>

    <!-- CABEÇALHO (O mesmo de sempre) -->
    <header class="relative z-20 w-full px-5 py-3 flex items-center justify-between max-w-3xl mx-auto bg-[#0A0907]/90 backdrop-blur-sm border-b border-white/5">
        <div class="flex items-center gap-2.5 cursor-pointer" onclick="location.reload()">
            
            <!-- LOGÓTIPO HONEY IA (NOVO VETOR SOFISTICADO) -->
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-400/10 to-amber-600/5 border border-amber-500/30 flex items-center justify-center text-amber-400 shadow-[0_0_15px_rgba(245,158,11,0.15)]">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    <path d="M19 12h2M5 12h2"/>
                </svg>
            </div>
            
            <div class="flex flex-col">
                <span class="text-xs font-black tracking-wider text-white">HONEY <span class="text-amber-400">IA</span></span>
                <span class="text-[8px] font-bold text-amber-500/70 tracking-widest uppercase">Neural Core</span>
            </div>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-neutral-400 ml-1"></i>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="w-9 h-9 rounded-xl bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-300 hover:text-amber-400 transition" title="Nova Conversa">
                <i data-lucide="square-pen" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL (CENTRADO) -->
    <main class="relative z-10 flex-1 flex flex-col justify-center items-center px-4 w-full max-w-3xl mx-auto">
        
        <!-- ECRÃ DE BOAS-VINDAS -->
        <div id="hero-section" class="text-center space-y-2 w-full transition-all duration-300 my-auto">
            <span class="inline-block text-[10px] font-extrabold tracking-widest text-amber-400 uppercase bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20 shadow-sm">
                ENGINE v2.0 ATIVA
            </span>
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-white mt-2">
                Em que podemos <span class="text-gradient">evoluir hoje?</span>
            </h1>
        </div>

        <!-- ÁREA DE CHAT (A Página não faz scroll aqui, o conteúdo é adicionado no topo) -->
        <div id="chat-container"></div>

    </main>

    <!-- ÁREA DE INPUT FIXA NO FUNDO (GRADIENTE SUAVE) -->
    <div id="input-section">
        <div class="w-full px-4 max-w-2xl mx-auto">
            <div id="file-indicator" class="hidden px-3 mb-2"></div>

            <form id="ai-form" class="chat-box rounded-3xl p-3.5 shadow-2xl w-full max-w-2xl mx-auto">
                <div class="flex items-center gap-2 px-1">
                    <label for="file-upload" class="p-2.5 rounded-full text-neutral-400 hover:text-amber-400 hover:bg-amber-500/10 cursor-pointer transition flex-shrink-0" title="Anexar Documento ou Imagem">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <input type="file" id="file-upload" class="hidden" accept=".pdf,.doc,.docx,.xlsx,.xls,.csv,image/*">
                    </label>

                    <textarea 
                        id="prompt-input" 
                        rows="1" 
                        placeholder="Escreva para a Honey IA..." 
                        class="w-full bg-transparent text-sm text-white placeholder-neutral-500 focus:outline-none resize-none py-2 font-medium max-h-32 no-scrollbar"
                    ></textarea>

                    <button type="button" class="p-2.5 text-neutral-400 hover:text-amber-400 transition flex-shrink-0">
                        <i data-lucide="mic" class="w-5 h-5"></i>
                    </button>

                    <button 
                        type="submit" 
                        id="submit-btn"
                        class="p-2.5 rounded-2xl bg-gradient-to-r from-amber-400 to-amber-500 text-black flex items-center justify-center flex-shrink-0 hover:scale-105 transition shadow-lg shadow-amber-500/20"
                    >
                        <i data-lucide="arrow-up" class="w-4 h-4 stroke-[3]"></i>
                    </button>
                </div>
            </form>

            <div id="suggestion-chips" class="flex items-center justify-center gap-2 mt-3 flex-wrap transition-opacity duration-300">
                <button onclick="setPrompt('Elabore um parecer estratégico para otimização de processos de ')" class="suggestion-pill px-3.5 py-2 rounded-full text-neutral-300 text-xs font-semibold flex items-center gap-1.5">
                    <i data-lucide="cpu" class="w-3.5 h-3.5 text-amber-400"></i>
                    <span>Engenharia & Processos</span>
                </button>
                <button onclick="setPrompt('Faça uma análise executiva detalhada dos dados e métricas deste documento: ')" class="suggestion-pill px-3.5 py-2 rounded-full text-neutral-300 text-xs font-semibold flex items-center gap-1.5">
                    <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5 text-amber-400"></i>
                    <span>
