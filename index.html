<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA — Plataforma Executiva</title>
    <style>
      :root {
        --bg-dark: #07090e;
        --bg-sidebar: #0d1117;
        --bg-card: #161b22;
        --accent-orange: #f59e0b;
        --accent-glow: rgba(245, 158, 11, 0.15);
        --text-main: #f3f4f6;
        --text-muted: #8b949e;
        --border-color: #30363d;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body, html {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: var(--bg-dark);
        color: var(--text-main);
      }

      .app-container {
        display: flex;
        height: 100dvh;
        width: 100vw;
        position: relative;
        overflow: hidden;
        background: radial-gradient(circle at 50% 15%, #1c150a 0%, var(--bg-dark) 70%);
      }

      /* Menu Lateral Oculto (Off-Canvas) */
      .sidebar {
        position: fixed;
        top: 0;
        left: -300px;
        width: 280px;
        height: 100%;
        background-color: var(--bg-sidebar);
        z-index: 1100;
        transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border-color);
        box-shadow: 20px 0 50px rgba(0,0,0,0.8);
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        z-index: 1050;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .sidebar-header {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
      }

      .logo-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-logo {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #000;
        font-size: 1.15rem;
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
      }

      .sidebar-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .platform-tag {
        font-size: 0.72rem;
        color: var(--text-muted);
      }

      .close-menu-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.2rem;
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
      }
      .close-menu-btn:hover { color: var(--text-main); background-color: rgba(255,255,255,0.05); }

      .sidebar-content {
        padding: 16px;
        overflow-y: auto;
        flex: 1;
      }

      .section-title {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.08em;
        margin-bottom: 10px;
        margin-top: 10px;
      }

      .nav-modes {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mode-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 12px 14px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        border-radius: 10px;
        text-align: left;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.2s ease;
      }

      .mode-btn:hover {
        background-color: rgba(255, 255, 255, 0.03);
        color: var(--text-main);
      }

      .mode-btn.active {
        background-color: var(--accent-glow);
        color: var(--accent-orange);
        border: 1px solid rgba(245, 158, 11, 0.2);
      }

      /* Área Principal */
      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        position: relative;
      }

      .chat-topbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        z-index: 10;
        background: transparent;
      }

      .menu-toggle-btn {
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        font-size: 1.1rem;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(13, 17, 23, 0.7);
        backdrop-filter: blur(8px);
        transition: border-color 0.2s;
      }
      .menu-toggle-btn:hover { border-color: var(--accent-orange); }

      /* Estado Inicial Hero (Inspirador) */
      .hero-welcome-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
        transition: opacity 0.3s ease;
      }

      .hero-welcome-state.hidden {
        display: none;
      }

      .hero-title {
        font-size: clamp(1.8rem, 5vw, 2.6rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #9ca3af 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero-subtitle {
        font-size: 0.95rem;
        color: var(--text-muted);
        max-width: 440px;
        margin-bottom: 28px;
        line-height: 1.5;
      }

      /* Caixa de Input Polida */
      .input-wrapper-container {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        padding: 0 12px;
      }

      .chat-input-card {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 12px 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .chat-input-card:focus-within {
        border-color: var(--accent-orange);
        box-shadow: 0 0 0 2px var(--accent-glow), 0 10px 30px rgba(0,0,0,0.6);
      }

      .user-input-field {
        width: 100%;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 0.95rem;
        resize: none;
        max-height: 120px;
        outline: none;
        line-height: 1.4;
        margin-bottom: 8px;
      }

      .card-bottom-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid rgba(255,255,255,0.06);
        padding-top: 8px;
      }

      .left-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .tool-icon-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.1rem;
        cursor: pointer;
        padding: 6px;
        border-radius: 8px;
        transition: color 0.2s, background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .tool-icon-btn:hover { color: var(--text-main); background-color: rgba(255,255,255,0.05); }

      .send-submit-btn {
        background-color: var(--accent-orange);
        color: #000;
        border: none;
        width: 34px;
        height: 34px;
        border-radius: 9px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.1s, opacity 0.2s;
        box-shadow: 0 2px 8px rgba(245, 158, 11, 0.4);
      }
      .send-submit-btn:hover { opacity: 0.9; transform: scale(1.03); }

      .file-preview-banner {
        font-size: 0.8rem;
        color: var(--accent-orange);
        background-color: var(--accent-glow);
        border: 1px solid rgba(245, 158, 11, 0.2);
        padding: 6px 12px;
        border-radius: 8px;
        margin-bottom: 8px;
        display: none;
        align-items: center;
        justify-content: space-between;
      }

      /* Container de Mensagens e Chat Ativo */
      .chat-messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 76px 16px 16px 16px;
        display: none;
        flex-direction: column;
        gap: 16px;
        max-width: 760px;
        width: 100%;
        margin: 0 auto;
        scroll-behavior: smooth;
      }

      .chat-messages-container.active {
        display: flex;
      }

      .message {
        display: flex;
        gap: 10px;
        max-width: 90%;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .ai-message { align-self: flex-start; }
      .user-message { align-self: flex-end; margin-left: auto; flex-direction: row-reverse; }

      .avatar-ai, .avatar-user {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .avatar-ai {
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #000;
        box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
      }
      .avatar-user {
        background-color: #30363d;
        color: var(--text-main);
      }

      .message-bubble {
        background-color: var(--bg-card);
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 0.93rem;
        line-height: 1.5;
        border: 1px solid var(--border-color);
        word-break: break-word;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }
      .user-message .message-bubble {
        background: linear-gradient(135deg, #1d4ed8, #1e40af);
        border-color: #3b82f6;
        color: #fff;
      }

      /* Estilização interna de Markdown */
      .message-bubble h2, .message-bubble h3 { margin: 8px 0 4px 0; color: #f3f4f6; }
      .message-bubble h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 4px; }
      .message-bubble h3 { font-size: 1rem; }
      .message-bubble p { margin-bottom: 6px; }
      .message-bubble p:last-child { margin-bottom: 0; }
      .message-bubble ul, .message-bubble ol { margin-left: 18px; margin-bottom: 6px; }
      .message-bubble code {
        background-color: rgba(0,0,0,0.3);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 0.85rem;
      }
      .message-bubble pre {
        background-color: #04060a;
        padding: 10px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 6px 0;
        border: 1px solid var(--border-color);
      }
      .message-bubble blockquote {
        border-left: 3px solid var(--accent-orange);
        padding-left: 8px;
        margin: 6px 0;
        color: var(--text-muted);
        font-style: italic;
      }

      .active-chat-footer {
        display: none;
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        padding: 12px 16px;
      }
      .active-chat-footer.active {
        display: block;
      }
    </style>
</head>
<body>

    <div class="app-container">
      <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="logo-wrapper">
            <div class="brand-logo">H</div>
            <div>
              <h2>Honey IA</h2>
              <span class="platform-tag">Plataforma Executiva</span>
            </div>
          </div>
          <button class="close-menu-btn" onclick="toggleMenu()">✕</button>
        </div>

        <div class="sidebar-content">
          <div class="section-title">MODO DE ATUAÇÃO</div>
          <nav class="nav-modes">
            <button class="mode-btn active"><span class="icon">🧠</span> Executiva Geral</button>
            <button class="mode-btn"><span class="icon">⚙️</span> Engenharia & Logística</button>
            <button class="mode-btn"><span class="icon">📚</span> Pedagógico & Científico</button>
            <button class="mode-btn"><span class="icon">💻</span> Arquitetura de Software</button>
          </nav>
        </div>
      </aside>

      <main class="chat-main">
        <header class="chat-topbar">
          <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
        </header>

        <!-- 1. Estado Inicial Hero -->
        <div id="hero-state" class="hero-welcome-state">
          <h1 class="hero-title">Onde as ideias começam</h1>
          <p class="hero-subtitle">Dá vida a projetos complexos em segundos ou obtém análises executivas avançadas.</p>
          
          <div class="input-wrapper-container">
            <div id="file-banner-hero" class="file-preview-banner">
              <span id="file-banner-text-hero">📎 Ficheiro anexado</span>
              <span onclick="removeFile()" style="cursor: pointer; font-weight: bold;">✕</span>
            </div>
            <div class="chat-input-card">
              <textarea id="user-input-hero" class="user-input-field" placeholder="Escreve uma mensagem ou anexa um documento..." rows="1" oninput="autoResize(this)" onkeydown="checkSubmit(event)"></textarea>
              
              <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">

              <div class="card-bottom-actions">
                <div class="left-actions">
                  <button class="tool-icon-btn" title="Anexar Ficheiro" onclick="document.getElementById('file-input').click()">📎</button>
                  <button class="tool-icon-btn" title="Ferramentas IA">✨</button>
                </div>
                <button class="send-submit-btn" onclick="sendMessage()">↑</button>
              </div>
            </div>
          </div>
        </div>

        <!-- 2. Estado de Chat Ativo -->
        <div id="chat-messages" class="chat-messages-container"></div>

        <div id="active-footer" class="active-chat-footer">
          <div id="file-banner-footer" class="file-preview-banner">
            <span id="file-banner-text-footer">📎 Ficheiro anexado</span>
            <span onclick="removeFile()" style="cursor: pointer; font-weight: bold;">✕</span>
          </div>
          <div class="chat-input-card">
            <textarea id="user-input-footer" class="user-input-field" placeholder="Escreve uma mensagem..." rows="1" oninput="autoResize(this)" onkeydown="checkSubmit(event)"></textarea>
            <div class="card-bottom-actions">
              <div class="left-actions">
                <button class="tool-icon-btn" title="Anexar Ficheiro" onclick="document.getElementById('file-input').click()">📎</button>
              </div>
              <button class="send-submit-btn" onclick="sendMessage()">↑</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let anexoBase64Global = null;
      let mimeTypeGlobal = null;
      let chatStarted = false;

      function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }

      function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        const otherId = textarea.id === 'user-input-hero' ? 'user-input-footer' : 'user-input-hero';
        const otherEl = document.getElementById(otherId);
        if (otherEl) {
          otherEl.value = textarea.value;
          otherEl.style.height = textarea.style.height;
        }
      }

      function checkSubmit(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        mimeTypeGlobal = file.type;
        const reader = new FileReader();
        reader.onload = function(e) {
          anexoBase64Global = e.target.result.split(',')[1];
          ['file-banner-hero', 'file-banner-footer'].forEach(id => {
            const b = document.getElementById(id);
            if(b) b.style.display = 'flex';
          });
          ['file-banner-text-hero', 'file-banner-text-footer'].forEach(id => {
            const t = document.getElementById(id);
            if(t) t.textContent = `📎 Anexado: ${file.name}`;
          });
        };
        reader.readAsDataURL(file);
      }

      function removeFile() {
        anexoBase64Global = null;
        mimeTypeGlobal = null;
        document.getElementById('file-input').value = '';
        ['file-banner-hero', 'file-banner-footer'].forEach(id => {
          const b = document.getElementById(id);
          if(b) b.style.display = 'none';
        });
      }

      async function sendMessage() {
        const activeInputId = chatStarted ? 'user-input-footer' : 'user-input-hero';
        const input = document.getElementById(activeInputId);
        const text = input.value.trim();

        if (!text && !anexoBase64Global) return;

        if (!chatStarted) {
          chatStarted = true;
          document.getElementById('hero-state').classList.add('hidden');
          document.getElementById('chat-messages').classList.add('active');
          document.getElementById('active-footer').classList.add('active');
        }

        const chatMessages = document.getElementById('chat-messages');

        chatMessages.innerHTML += `
          <div class="message user-message">
            <div class="avatar-user">U</div>
            <div class="message-bubble">${escapeHtml(text) || '[Documento Anexado]'}</div>
          </div>
        `;

        const payloadPrompt = text;
        const payloadAnexo = anexoBase64Global;
        const payloadMime = mimeTypeGlobal;

        document.getElementById('user-input-hero').value = '';
        document.getElementById('user-input-footer').value = '';
        document.getElementById('user-input-hero').style.height = 'auto';
        document.getElementById('user-input-footer').style.height = 'auto';
        removeFile();
        chatMessages.scrollTop = chatMessages.scrollHeight;

        const loadingId = 'loading-' + Date.now();
        chatMessages.innerHTML += `
          <div id="${loadingId}" class="message ai-message">
            <div class="avatar-ai">H</div>
            <div class="message-bubble" style="color: var(--text-muted);">A processar análise executiva...</div>
          </div>
        `;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const response = await fetch('/gerar-gratis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: payloadPrompt,
              anexoBase64: payloadAnexo,
              mimeType: payloadMime
            })
          });

          const data = await response.json();
          const loadingEl = document.getElementById(loadingId);
          if (loadingEl) loadingEl.remove();

          const respostaFinal = data.sucesso ? data.resposta : (data.erro || 'Erro ao processar a solicitação.');

          chatMessages.innerHTML += `
            <div class="message ai-message">
              <div class="avatar-ai">H</div>
              <div class="message-bubble">${renderizarMarkdown(respostaFinal)}</div>
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;

        } catch (err) {
          console.error(err);
          const loadingEl = document.getElementById(loadingId);
          if (loadingEl) loadingEl.remove();
          chatMessages.innerHTML += `
            <div class="message ai-message">
              <div class="avatar-ai">H</div>
              <div class="message-bubble" style="color: #ef4444;">Erro de conexão com o servidor.</div>
            </div>
          `;
        }
      }

      function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function renderizarMarkdown(texto) {
        let safeText = escapeHtml(texto);
        safeText = safeText.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        safeText = safeText.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        safeText = safeText.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        safeText = safeText.replace(/\*(.*?)\*/g, '<em>$1</em>');
        safeText = safeText.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
        safeText = safeText.replace(/\n/g, '<br>');
        return safeText;
      }
    </script>
</body>
</html>
