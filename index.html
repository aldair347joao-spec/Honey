<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Honey IA | Elite Premium Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffb700; 
            --gold-dark: #cc9200; 
            --bg: #030305; 
            --card: #0b0b11; 
            --border: #12121a; 
            --preview-bg: #0d0d14; 
            --text-main: #f1f1f6;
            --text-muted: #8e8e9f;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100dvh; 
            overflow: hidden; 
            width: 100vw; 
            -webkit-font-smoothing: antialiased;
        }
        
        .app-layout { display: flex; flex-direction: row; width: 100%; height: 100%; }

        .chat-section { 
            flex: 1; display: flex; flex-direction: column; height: 100%; background: var(--bg); overflow: hidden; position: relative;
        }
        
        .sandbox-section { 
            display: none; flex-direction: column; width: 50%; height: 100%; background: var(--preview-bg); border-left: 1px solid var(--border); overflow: hidden; position: relative;
        }

        .app-layout.split-active .sandbox-section { display: flex; animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        #welcome-screen { 
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 100%; max-width: 520px; text-align: center; padding: 24px; z-index: 1; transition: opacity 0.4s ease, visibility 0.4s; 
        }
        .hero-bee { font-size: 64px; animation: float 3.5s ease-in-out infinite; margin-bottom: 24px; display: inline-block; filter: drop-shadow(0 10px 20px rgba(255, 183, 0, 0.2)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        #welcome-screen h1 { font-size: 40px; color: #fff; margin-bottom: 16px; font-weight: 700; letter-spacing: -1.5px; background: linear-gradient(135deg, #fff 40%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #welcome-screen p { color: var(--text-muted); font-size: 15.5px; line-height: 1.65; max-width: 440px; margin: 0 auto; }

        /* DESIGN PREMIUM SEM IMPUREZAS VISUAIS */
        .chat-container { 
            flex: 1; overflow-y: auto; padding: 40px 24px 140px 24px; display: flex; flex-direction: column; gap: 40px; width: 100%; max-width: 760px; margin: 0 auto; z-index: 2; scroll-behavior: smooth;
        }
        
        .row-message { display: flex; flex-direction: column; width: 100%; position: relative; }
        .row-user { align-items: flex-end; }
        .row-honey { align-items: flex-start; border-bottom: 1px solid rgba(22, 22, 34, 0.4); padding-bottom: 28px; }

        .msg-body { 
            font-size: 15.5px; line-height: 1.85; color: var(--text-main); word-wrap: break-word; width: 100%;
        }
        
        /* Balão invisível e sofisticado para o Utilizador */
        .row-user .msg-body { text-align: right; color: #fff; max-width: 80%; font-weight: 400; background: rgba(255, 183, 0, 0.02); padding: 12px 20px; border-radius: 18px; border: 1px solid rgba(255, 183, 0, 0.06); white-space: pre-wrap; }
        
        /* Estilização interna estilo Gemini */
        .msg-body strong { color: #fff; font-weight: 600; display: inline-block; margin-top: 6px; font-size: 16px; }
        .msg-paragraph { margin-bottom: 14px; }

        /* Animação suave por blocos */
        .premium-fade-in { 
            animation: elegantFade 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes elegantFade { 
            from { opacity: 0; transform: translateY(6px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* BARRA DE ENTRADA */
        .input-area { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 24px; display: flex; justify-content: center; background: linear-gradient(to top, var(--bg) 70%, transparent); z-index: 10;
        }
        .input-wrapper { 
            width: 100%; max-width: 680px; background: #0b0b12; border: 1px solid var(--border); border-radius: 28px; display: flex; align-items: center; padding: 10px 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); transition: border-color 0.2s; gap: 8px; 
        }
        .input-wrapper:focus-within { border-color: rgba(255, 183, 0, 0.3); }
        .chat-input { flex: 1; background: none; border: none; padding: 6px; color: #fff; font-size: 15.5px; outline: none; }
        .chat-input::placeholder { color: #48485e; }
        
        .action-btn { background: none; border: none; color: #62627a; width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .action-btn:hover { color: var(--gold); background: rgba(255, 183, 0, 0.05); }
        .mic-btn.recording { color: #ff4a4a; background: rgba(255,74,74,0.08); animation: pulseRecord 1.5s infinite; }
        @keyframes pulseRecord { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .send-btn { background: var(--gold); color: #030305; }
        .send-btn:hover { background: var(--gold-dark); }
        .send-btn:disabled { background: #12121a; color: #38384d; cursor: not-allowed; }

        .btn-group { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; width: 100%; animation: elegantFade 0.4s ease; }
        .premium-btn { background: rgba(255, 183, 0, 0.03); border: 1px solid rgba(255, 183, 0, 0.1); color: var(--gold); cursor: pointer; display: inline-flex; align-items: center; padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 500; gap: 6px; transition: all 0.2s; }
        .premium-btn:hover { background: rgba(255, 183, 0, 0.08); border-color: var(--gold); }
        .visualize-btn { background: rgba(0, 230, 118, 0.03); border-color: rgba(0, 230, 118, 0.15); color: #00e676; }
        .visualize-btn:hover { background: rgba(0, 230, 118, 0.08); border-color: #00e676; }

        /* INDICADOR DE CARREGAMENTO */
        .typing-indicator { display: flex; gap: 6px; padding: 12px 4px; align-items: center; }
        .typing-indicator span { width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.4); opacity: 0.2; } 40% { transform: scale(1); opacity: 1; } }

        /* SANDBOX */
        .sandbox-header { height: 52px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .browser-dots { display: flex; gap: 6px; }
        .dot { width: 11px; height: 11px; border-radius: 50%; background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .browser-address { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 6px 12px; font-size: 11.5px; color: var(--text-muted); width: 50%; text-align: center; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        
        .sandbox-body { flex: 1; padding: 12px; background: #07070c; }
        .sandbox-iframe { width: 100%; height: 100%; border: none; background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        @media (max-width: 800px) {
            .app-layout.split-active { flex-direction: column-reverse; }
            .app-layout.split-active .chat-section { height: 52%; }
            .app-layout.split-active .sandbox-section { width: 100%; height: 48%; border-left: none; border-bottom: 1px solid var(--border); }
            .row-user .msg-body { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-layout" id="main-layout">
        <div class="chat-section" id="chat-area">
            <div id="welcome-screen">
                <span class="hero-bee">🐝</span>
                <h1>Honey IA</h1>
                <p>A tua arquiteta digital. Desenvolve aplicações, websites e explora ideias de elite com uma execução premium impecável.</p>
            </div>

            <div class="chat-container" id="chat-box"></div>

            <div class="input-area">
                <div class="input-wrapper">
                    <button class="action-btn" id="mic-btn" onclick="alternarGravacao()">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.61V21h2v-3.39c3.28-.41 6-3.19 6-6.61h-1.7z"/></svg>
                    </button>
                    <input type="text" class="chat-input" id="user-input" placeholder="Peça um site, app ou faça uma pergunta..." onkeypress="verificarTeclado(event)">
                    <button class="action-btn send-btn" id="send-btn" onclick="enviarMensagem()">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="sandbox-section" id="sandbox-panel">
            <div class="sandbox-header">
                <div class="browser-dots"><div class="dot"></div><div class="dot yellow"></div><div class="dot green"></div></div>
                <div class="browser-address">honey-ia://live-preview-premium</div>
                <button class="premium-btn" onclick="fecharSandbox()" style="color: #ff4a4a; border-color: rgba(255,74,74,0.2);">Ocultar</button>
            </div>
            <div class="sandbox-body">
                <iframe class="sandbox-iframe" id="sandbox-preview" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>

<script>
    const mainLayout = document.getElementById('main-layout');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeScreen = document.getElementById('welcome-screen');
    const micBtn = document.getElementById('mic-btn');
    const sandboxIframe = document.getElementById('sandbox-preview');

    let reconhecimentoVoz;
    let estaGravando = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        reconhecimentoVoz = new SpeechRecognition();
        reconhecimentoVoz.continuous = false;
        reconhecimentoVoz.interimResults = false;

        reconhecimentoVoz.onresult = (event) => {
            const textoDitado = event.results[0][0].transcript;
            if(textoDitado.trim() !== "") {
                userInput.value = textoDitado;
                enviarMensagem();
            }
        };
        reconhecimentoVoz.onend = () => { estaGravando = false; micBtn.classList.remove('recording'); };
    }

    function alternarGravacao() {
        if (!reconhecimentoVoz) return alert("Microfone indisponível.");
        if (estaGravando) { reconhecimentoVoz.stop(); } 
        else { estaGravando = true; micBtn.classList.add('recording'); reconhecimentoVoz.start(); }
    }

    function falarTexto(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let limpo = texto.replace(/```[\s\S]*?```/g, '[Código]');
            const fala = new SpeechSynthesisUtterance(limpo.replace(/[`*#\[\]\-]/g, ' '));
            fala.lang = 'pt-PT';
            window.speechSynthesis.speak(fala);
        }
    }

    function verificarTeclado(event) { if (event.key === 'Enter') enviarMensagem(); }

    function formatarMarkdownParaHtml(texto) {
        // Converte os blocos de código markdown para evitar renderização incorreta na UI
        let textoFormatado = texto.replace(/```[\s\S]*?```/g, (match) => {
            return `<div style="background: #12121a; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; color: #a5a5b5; margin: 10px 0; overflow-x: auto;">[Código Estruturado no Painel Lateral]</div>`;
        });
        
        // Converte as marcações de negrito **texto** em tags HTML reais <strong>
        textoFormatado = textoFormatado.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        // Divide o texto em parágrafos estruturados
        return textoFormatado.split('\n').map(p => p.trim() ? `<div class="msg-paragraph">${p}</div>` : '').join('');
    }

    // RENDERIZAÇÃO ESTÁTICA FLUIDA (EVITA EMPURRAR O ECRÃ)
    function renderizarConteudoElegante(container, texto, callback) {
        container.innerHTML = "";
        
        // Converte toda a resposta estruturada para HTML de uma vez só
        const htmlFinal = formatarMarkdownParaHtml(texto);
        
        // Insere o conteúdo com uma animação suave de opacidade geral, sem mexer no scroll
        const wrapper = document.createElement('div');
        wrapper.className = 'premium-fade-in';
        wrapper.innerHTML = htmlFinal;
        container.appendChild(wrapper);
        
        if (callback) callback();
    }

    function extrairCodigoHTML(texto) {
        const match = texto.match(/```html([\s\S]*?)```/);
        return match ? match[1].trim() : null;
    }

    function carregarNoSandbox(codigoHTML) {
        mainLayout.classList.add('split-active');
        const blob = new Blob([codigoHTML], { type: 'text/html' });
        sandboxIframe.src = URL.createObjectURL(blob);
    }

    function fecharSandbox() { mainLayout.classList.remove('split-active'); }

    async function enviarMensagem() {
        const promptText = userInput.value.trim();
        if (!promptText) return;

        if (welcomeScreen && welcomeScreen.style.opacity !== '0') {
            welcomeScreen.style.opacity = '0';
            setTimeout(() => welcomeScreen.style.visibility = 'hidden', 400);
        }

        criarLinhaMensagem(promptText, 'row-user');
        userInput.value = "";
        sendBtn.disabled = true;

        // O Scroll automático APENAS acontece aqui (quando o utilizador envia a pergunta)
        chatBox.scrollTop = chatBox.scrollHeight;

        const linhaHoney = criarLinhaMensagem("", 'row-honey');
        const indicador = document.createElement('div');
        indicador.className = 'typing-indicator';
        indicador.innerHTML = '<span></span><span></span><span></span>';
        linhaHoney.appendChild(indicador);

        try {
            const response = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
            const data = await response.json();
            
            linhaHoney.innerHTML = "";

            if (response.ok && data.sucesso) {
                // Renderiza sem forçar a descida da tela enquanto lês
                renderizarConteudoElegante(linhaHoney, data.codigo, () => {
                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'btn-group';

                    const btnOuvir = document.createElement('button');
                    btnOuvir.className = 'premium-btn';
                    btnOuvir.textContent = `Ouvir`;
                    btnOuvir.onclick = () => falarTexto(data.codigo);
                    btnGroup.appendChild(btnOuvir);

                    const codigoDetectado = extrairCodigoHTML(data.codigo);
                    if (codigoDetectado) {
                        const btnVisualizar = document.createElement('button');
                        btnVisualizar.className = 'premium-btn visualize-btn';
                        btnVisualizar.textContent = `Visualizar App`;
                        btnVisualizar.onclick = () => carregarNoSandbox(codigoDetectado);
                        btnGroup.appendChild(btnVisualizar);

                        carregarNoSandbox(codigoDetectado);
                    }
                    linhaHoney.appendChild(btnGroup);
                });
            } else {
                linhaHoney.textContent = "Erro: " + (data.erro || "Falha na requisição.");
            }
        } catch (err) {
            linhaHoney.innerHTML = "";
            linhaHoney.textContent = "Erro de ligação ao servidor de elite.";
        } finally {
            sendBtn.disabled = false;
        }
    }

    function criarLinhaMensagem(texto, classeLinha) {
        const row = document.createElement('div');
        row.className = `row-message ${classeLinha}`;
        
        const body = document.createElement('div');
        body.className = 'msg-body';
        body.textContent = texto;
        
        row.appendChild(body);
        chatBox.appendChild(row);
        return body;
    }
</script>
</body>
</html>
