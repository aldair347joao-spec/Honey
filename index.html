<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HONEY IA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #171717;
            color: #ECECEC; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        .chat-box {
            background-color: #212121;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .chat-box:focus-within {
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .suggestion-pill {
            background-color: #212121;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .suggestion-pill:hover {
            background-color: #2f2f2f;
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-neutral-700 selection:text-white">

    <!-- CABEÇALHO -->
    <header class="w-full px-4 py-4 flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <div class="w-8 h-8 rounded-lg bg-neutral-800 border border-neutral-700 flex items-center justify-center text-amber-400">
                <i data-lucide="hexagon" class="w-4 h-4"></i>
            </div>
            <span class="text-sm font-semibold tracking-wide text-white">HONEY IA</span>
            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-neutral-400"></i>
        </div>

        <div class="flex items-center gap-3">
            <button class="w-8 h-8 rounded-full bg-neutral-800 border border-neutral-700 flex items-center justify-center text-neutral-300 hover:text-white transition">
                <i data-lucide="square-pen" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 flex flex-col justify-center items-center px-4 w-full max-w-xl mx-auto -mt-12">
        
        <div class="text-center space-y-2 mb-8">
            <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight text-white">
                Onde devemos começar?
            </h1>
        </div>

        <div class="w-full">
            <form id="ai-form" class="chat-box rounded-3xl p-3 shadow-xl">
                <div class="flex items-center gap-2 px-2">
                    <label for="file-upload" class="p-2 rounded-full text-neutral-400 hover:text-white hover:bg-neutral-800 cursor-pointer transition">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                        <input type="file" id="file-upload" class="hidden">
                    </label>

                    <textarea 
                        id="prompt-input" 
                        rows="1" 
                        placeholder="Pergunte qualquer coisa" 
                        class="w-full bg-transparent text-sm text-white placeholder-neutral-500 focus:outline-none resize-none py-2 font-normal"
                    ></textarea>

                    <button type="button" class="p-2 text-neutral-400 hover:text-white transition">
                        <i data-lucide="mic" class="w-5 h-5"></i>
                    </button>

                    <button 
                        type="submit" 
                        class="p-2 rounded-full bg-white text-black flex items-center justify-center flex-shrink-0 hover:bg-neutral-200 transition"
                    >
                        <i data-lucide="arrow-up" class="w-4 h-4 stroke-[3]"></i>
                    </button>
                </div>
            </form>

            <div class="flex items-center justify-center mt-4">
                <button onclick="setPrompt('O que você pode fazer?')" class="suggestion-pill px-4 py-2 rounded-full text-neutral-300 text-xs font-medium flex items-center gap-2">
                    <span>O que você pode fazer?</span>
                </button>
            </div>
        </div>

    </main>

    <!-- RODAPÉ -->
    <footer class="w-full py-4 text-center text-[11px] text-neutral-500 font-normal px-4">
        A Honey IA pode cometer erros. Verifique informações importantes.
    </footer>

    <script>
        lucide.createIcons();

        const promptInput = document.getElementById('prompt-input');
        function setPrompt(text) { 
            promptInput.value = text; 
            promptInput.focus(); 
        }
    </script>
</body>
</html>
