<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA | Global Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffb700; --gold-dark: #cc9200; --bg: #08080c; --card: #12121a; --border: #1f1f2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        #welcome-screen { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 100px); background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; transition: opacity 0.5s ease, visibility 0.5s; text-align: center; padding: 20px; }
        .hero-bee { font-size: 80px; animation: float 3s ease-in-out infinite; margin-bottom: 20px; display: inline-block; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #welcome-screen h1 { font-size: 36px; color: var(--gold); margin-bottom: 10px; font-weight: 600; }
        #welcome-screen p { color: #8a8a9e; max-width: 400px; font-size: 16px; }

        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: 120px; z-index: 1; }
        .message { display: flex; flex-direction: column; width: fit-content; max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; position: relative; word-wrap: break-word; white-space: pre-wrap; }
        .user-msg { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; }
        .honey-msg { background: var(--card); color: #f1f1f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .audio-play-btn { background: rgba(255, 183, 0, 0.1); border: 1px solid rgba(255, 183, 0, 0.2); color: var(--gold); cursor: pointer; display: inline-flex; align-items: center; margin-top: 12px; padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; gap: 6px; }
        
        .input-area { position: fixed; bottom: 20px; left: 0; width: 100%; padding: 0 15px; display: flex; justify-content: center; z-index: 5; }
        .input-wrapper { max-width: 600px; width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 28px; display: flex; align-items: center; padding: 8px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .chat-input { flex: 1; background: none; border: none; padding: 8px 4px; color: #fff; font-size: 16px; outline: none; }
        .action-btn { background: none; border: none; color: #8a8a9e; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .send-btn { background: var(--gold); color: #000; }
        .recording { color: #ff4a4a !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <span class="hero-bee">🐝</span>
        <h1>Honey IA</h1>
        <p>Your intelligent assistant. Speak to me in any language.</p>
    </div>

    <div class="chat-container" id="chat-box"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="action-btn" id="mic-btn" onclick="alternarGravacao()">🎙️</button>
            <input type="text" class="chat-input" id="user-input" placeholder="Say something..." onkeypress="verificarTeclado(event)">
            <button class="action-btn send-btn" id="send-btn" onclick="enviarMensagem()">➤</button>
        </div>
    </div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const micBtn = document.getElementById('mic-btn');

    let reconhecimentoVoz;
    let estaGravando = false;

    // Reconhecimento Multilíngue: Removemos o 'pt-PT' forçado
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        reconhecimentoVoz = new SpeechRecognition();
        reconhecimentoVoz.continuous = false;
        reconhecimentoVoz.interimResults = false;
        // Se deixarmos o 'lang' vazio, o navegador usa a língua do telemóvel do utilizador
        reconhecimentoVoz.lang = undefined; 

        reconhecimentoVoz.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            enviarMensagem();
        };

        reconhecimentoVoz.onend = () => {
            estaGravando = false;
            micBtn.classList.remove('recording');
        };
    }

    function alternarGravacao() {
        if (estaGravando) {
            reconhecimentoVoz.stop();
        } else {
            estaGravando = true;
            micBtn.classList.add('recording');
            reconhecimentoVoz.start();
        }
    }

    // Leitor de Voz Adaptativo: Não força 'pt-PT', deixa o motor escolher a voz baseada no texto
    function falarTexto(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const fala = new SpeechSynthesisUtterance(texto);
            
            // Removemos o 'fala.lang = pt-PT'. 
            // O navegador tentará encontrar a voz que melhor se adapta à língua do texto recebido.
            
            window.speechSynthesis.speak(fala);
        }
    }

    async function enviarMensagem() {
        const promptText = userInput.value.trim();
        if (!promptText) return;

        // Ocultar boas-vindas
        const welcome = document.getElementById('welcome-screen');
        if (welcome.style.opacity !== '0') welcome.style.opacity = '0';

        criarBalao(promptText, 'user-msg');
        userInput.value = "";

        const honeyBalao = criarBalao("...", 'honey-msg');
        
        try {
            const response = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: promptText })
            });
            const data = await response.json();
            
            honeyBalao.textContent = data.codigo || "Error.";
            
            const btnOuvir = document.createElement('button');
            btnOuvir.className = 'audio-play-btn';
            btnOuvir.textContent = "🔊 Listen";
            btnOuvir.onclick = () => falarTexto(data.codigo);
            honeyBalao.appendChild(btnOuvir);
        } catch (err) {
            honeyBalao.textContent = "Connection error.";
        }
    }

    function criarBalao(texto, classe) {
        const div = document.createElement('div');
        div.className = `message ${classe}`;
        div.textContent = texto;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function verificarTeclado(event) { if (event.key === 'Enter') enviarMensagem(); }
</script>
</body>
</html>
