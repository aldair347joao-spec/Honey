<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA — Inteligência Artificial Enterprise</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Marked.js para renderização de respostas -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        gold: {
                            300: '#FDE68A',
                            400: '#FBBF24',
                            500: '#F59E0B',
                            600: '#D97706',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background-color: #030508; 
            color: #F8FAFC; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* Efeito Glow Central */
        .ai-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15) 0%, rgba(217, 119, 6, 0.05) 40%, transparent 70%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
        }

        /* Texto Gradiente Gold */
        .text-gold-gradient {
            background: linear-gradient(135deg, #FFFFFF 30%, #FBBF24 70%, #D97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Vidro Premium */
        .glass-box {
            background: rgba(10, 15, 26, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-box:focus-within {
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 0 25px rgba(245, 158, 11, 0.25), 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .markdown-content { 
            font-size: 0.95rem; 
            line-height: 1.7; 
            color: #E2E8F0; 
        }
        .markdown-content h2 { font-size: 1.1rem; font-weight: 700; color: #FBBF24; margin-top: 1rem; }
        .markdown-content code { background: rgba(255, 255, 255, 0.1); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; color: #FDE047; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative selection:bg-gold-500 selection:text-black">

    <!-- CANVAS DE FUNDO ANIMADO (REDE NEURONAL DE IA) -->
    <canvas id="neural-bg" class="fixed inset-0 w-full h-full pointer-events-none z-0 opacity-40"></canvas>
    
    <!-- EFEITO DE LUZ GLOW -->
    <div class="ai-glow"></div>

    <!-- HEADER / BARRA SUPERIOR -->
    <header class="relative z-20 w-full px-6 py-4 flex items-center justify-between max-w-6xl mx-auto">
        <div class="flex items-center gap-2.5 cursor-pointer" onclick="resetPage()">
            <div class="w-9 h-9 rounded-xl bg-gold-500/10 border border-gold-500/30 flex items-center justify-center text-gold-400 font-bold shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294l5.122-3.84a.5.5 0 0 1 .78.528l-2.73 12.28A2 2 0 0 1 18.125 20H5.875a2 2 0 0 1-1.953-1.868L1.192 5.852a.5.5 0 0 1 .78-.528l5.122 3.84a1 1 0 0 0 1.516-.294z"/></svg>
            </div>
            <div class="flex flex-col">
                <span class="text-base font-extrabold tracking-tight text-white leading-none">HONEY IA</span>
                <span class="text-[9px] font-bold text-gold-400 tracking-widest uppercase mt-0.5">Enterprise Engine</span>
            </div>
        </div>

        <button class="px-4 py-2 rounded-xl bg-white/[0.04] hover:bg-white/[0.08] border border-white/10 text-xs font-semibold text-gray-300 transition active:scale-95 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span>Sistema Online</span>
        </button>
    </header>

    <!-- CONTEÚDO PRINCIPAL (CENTRALIZADO) -->
    <main class="relative z-10 flex-1 flex flex-col justify-center items-center px-4 py-6 w-full max-w-3xl mx-auto">
        
        <!-- SECÇÃO HERO (TÍTULO E BOAS-VINDAS) -->
        <div id="hero-section" class="text-center space-y-4 mb-8 transition-all duration-500">
            <div class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-full bg-gold-500/10 border border-gold-500/20 text-gold-400 text-xs font-medium mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                <span>Modelo Neural de Alta Performance</span>
            </div>
            <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight text-white leading-tight">
                Em que podemos <br/>
                <span class="text-gold-gradient">avançar hoje?</span>
            </h1>
            <p class="text-xs sm:text-sm text-gray-400 max-w-md mx-auto leading-relaxed">
                Desenvolvimento fullstack, arquitetura de marcas, roteiros e inteligência estratégica instantânea.
            </p>
        </div>

        <!-- ÁREA DE RESPOSTAS / CHAT (OCULTA NO INÍCIO) -->
        <div id="chat-stream" class="w-full space-y-4 mb-6 hidden max-h-[50vh] overflow-y-auto no-scrollbar pr-1"></div>

        <!-- CAIXA DE CONVERSA PRINCIPAL (NO CENTRO) -->
        <div class="w-full">
            <form id="ai-form" class="glass-box rounded-3xl p-3 transition-all duration-300">
                
                <!-- OPÇÕES / MODOS -->
                <div class="flex items-center justify-between px-2 pb-2 mb-2 border-b border-white/[0.06]">
                    <select id="mode-selector" class="bg-gold-500/10 border border-gold-500/20 text-gold-400 text-xs font-semibold py-1 px-2.5 rounded-xl focus:outline-none cursor-pointer">
                        <option value="dev" class="bg-[#0A0F1A] text-white">⚡ Fullstack Dev</option>
                        <option value="designer" class="bg-[#0A0F1A] text-white">🎨 UI/UX Design</option>
                        <option value="copy" class="bg-[#0A0F1A] text-white">✍️ Copywriting</option>
                        <option value="biz" class="bg-[#0A0F1A] text-white">📈 Estratégia Biz</option>
                    </select>

                    <span class="text-[10px] text-gray-500 font-mono tracking-wider">HONEY-v2.0</span>
                </div>

                <!-- CAMPO DE TEXTO E BOTÃO -->
                <div class="flex items-end gap-2 px-1">
                    <label for="file-upload" class="p-2.5 rounded-2xl bg-white/[0.04] text-gray-400 hover:text-white cursor-pointer transition flex-shrink-0 flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        <input type="file" id="file-upload" class="hidden">
                    </label>

                    <textarea 
                        id="prompt-input" 
                        rows="2" 
                        placeholder="Descreva a sua ideia ou projeto..." 
                        class="w-full bg-transparent text-sm text-white placeholder-gray-500 focus:outline-none resize-none max-h-32 py-1.5"
                    ></textarea>

                    <button 
                        type="submit" 
                        class="p-3 rounded-2xl bg-gold-400 hover:bg-gold-300 text-black font-bold flex items-center justify-center flex-shrink-0 shadow-[0_0_20px_rgba(245,158,11,0.4)] active:scale-95 transition"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                </div>
            </form>

            <!-- SUGESTÕES RÁPIDAS ABAIXO DA CAIXA -->
            <div id="quick-chips" class="flex items-center justify-center gap-2 mt-4 flex-wrap">
                <button onclick="setPrompt('Criar uma Landing Page completa para ')" class="px-3.5 py-1.5 rounded-full bg-white/[0.03] border border-white/10 text-gray-400 hover:text-gold-300 hover:border-gold-500/30 text-xs font-medium transition active:scale-95">
                    ⚡ Landing Page
                </button>
                <button onclick="setPrompt('Criar um conceito de marca e logo para ')" class="px-3.5 py-1.5 rounded-full bg-white/[0.03] border border-white/10 text-gray-400 hover:text-gold-300 hover:border-gold-500/30 text-xs font-medium transition active:scale-95">
                    🎨 Branding & Arte
                </button>
                <button onclick="setPrompt('Escrever um roteiro de vídeo comercial para ')" class="px-3.5 py-1.5 rounded-full bg-white/[0.03] border border-white/10 text-gray-400 hover:text-gold-300 hover:border-gold-500/30 text-xs font-medium transition active:scale-95">
                    🎬 Roteiro de Vídeo
                </button>
            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="relative z-20 w-full px-4 py-4 text-center text-xs text-gray-600">
        Honey IA Enterprise © 2026 — Inteligência Artificial Avançada
    </footer>

    <!-- SCRIPT DE ANIMAÇÃO DA REDE NEURONAL & LÓGICA DA PÁGINA -->
    <script>
        // 1. CANVAS DA REDE NEURONAL (FUNDO DE IA)
        const canvas = document.getElementById('neural-bg');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = Array.from({ length: 45 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            radius: Math.random() * 1.8 + 1
        }));

        function drawNeuralNetwork() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(245, 158, 11, 0.6)';
            ctx.strokeStyle = 'rgba(245, 158, 11, 0.08)';

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(drawNeuralNetwork);
        }
        drawNeuralNetwork();

        // 2. INTERAÇÃO E LÓGICA DO CHAT
        const promptInput = document.getElementById('prompt-input');
        const aiForm = document.getElementById('ai-form');
        const heroSection = document.getElementById('hero-section');
        const chatStream = document.getElementById('chat-stream');
        const quickChips = document.getElementById('quick-chips');

        function setPrompt(text) {
            promptInput.value = text;
            promptInput.focus();
        }

        function resetPage() {
            heroSection.classList.remove('hidden');
            quickChips.classList.remove('hidden');
            chatStream.classList.add('hidden');
            chatStream.innerHTML = '';
            promptInput.value = '';
        }

        aiForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = promptInput.value.trim();
            if (!text) return;

            // Transição visual: oculta o hero para focar na resposta
            heroSection.classList.add('hidden');
            quickChips.classList.add('hidden');
            chatStream.classList.remove('hidden');

            // Adiciona pergunta do utilizador
            const userBubble = document.createElement('div');
            userBubble.className = 'flex justify-end w-full my-2';
            userBubble.innerHTML = `<div class="bg-gold-500/20 border border-gold-500/30 text-white px-4 py-2.5 rounded-2xl rounded-tr-xs text-xs sm:text-sm font-medium max-w-[85%]">${text}</div>`;
            chatStream.appendChild(userBubble);

            promptInput.value = '';

            // Indicador de carregamento
            const loader = document.createElement('div');
            loader.className = 'flex items-center gap-2 text-gold-400 text-xs font-semibold py-3 animate-pulse';
            loader.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> A processar modelo neural...`;
            chatStream.appendChild(loader);

            chatStream.scrollTop = chatStream.scrollHeight;

            try {
                const response = await fetch('/gerar-gratis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, modo: document.getElementById('mode-selector').value })
                });

                const data = await response.json();
                loader.remove();

                const aiBubble = document.createElement('div');
                aiBubble.className = 'p-4 rounded-2xl bg-white/[0.03] border border-white/10 text-xs sm:text-sm space-y-2';
                
                if (data.sucesso) {
                    aiBubble.innerHTML = `<div class="text-gold-400 font-bold text-xs uppercase tracking-wider mb-1">Honey IA</div><div class="markdown-content">${marked.parse(data.resposta)}</div>`;
                } else {
                    aiBubble.innerHTML = `<div class="text-red-400 font-bold">Aviso</div><p>${data.erro}</p>`;
                }

                chatStream.appendChild(aiBubble);
                chatStream.scrollTop = chatStream.scrollHeight;

            } catch (err) {
                loader.remove();
                const errBubble = document.createElement('div');
                errBubble.className = 'p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs';
                errBubble.innerText = 'Falha de ligação ao servidor.';
                chatStream.appendChild(errBubble);
            }
        });
    </script>
</body>
</html>
