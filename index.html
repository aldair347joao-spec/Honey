<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA — Plataforma Executiva</title>
    <style>
      :root {
        --bg-dark: #0f172a;
        --bg-sidebar: #1e293b;
        --bg-card: #1e293b;
        --accent-orange: #f59e0b;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #334155;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body, html {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: var(--bg-dark);
        color: var(--text-main);
      }

      .app-container {
        display: flex;
        height: 100dvh;
        width: 100vw;
        position: relative;
        overflow: hidden;
      }

      /* Menu Lateral Oculto (Off-Canvas) */
      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        width: 280px;
        height: 100%;
        background-color: var(--bg-sidebar);
        z-index: 1100;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border-color);
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
        z-index: 1050;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .sidebar-header {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
      }

      .logo-wrapper {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-logo {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background-color: var(--accent-orange);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #000;
      }

      .sidebar-header h2 {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .platform-tag {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .close-menu-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.2rem;
        cursor: pointer;
      }

      .sidebar-content {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }

      .section-title {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.05em;
        margin-bottom: 12px;
        margin-top: 16px;
      }

      .nav-modes {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mode-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        background: transparent;
        border: none;
        color: var(--text-muted);
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.2s;
      }

      .mode-btn:hover, .mode-btn.active {
        background-color: rgba(245, 158, 11, 0.1);
        color: var(--accent-orange);
      }

      /* Área Principal de Chat */
      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        background-color: var(--bg-dark);
      }

      .chat-topbar {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        background-color: var(--bg-dark);
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .menu-toggle-btn {
        background: none;
        border: 1px solid var(--border-color);
        color: var(--text-main);
        font-size: 1.2rem;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .header-titles h1 {
        font-size: 1rem;
        font-weight: 600;
      }

      .subtitle {
        font-size: 0.75rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 280px;
      }

      .chat-messages {
        flex: 1;
        padding: 16px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .message {
        display: flex;
        gap: 10px;
        max-width: 90%;
      }

      .ai-message {
        align-self: flex-start;
      }

      .user-message {
        align-self: flex-end;
        margin-left: auto;
        flex-direction: row-reverse;
      }

      .avatar-ai, .avatar-user {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
      }

      .avatar-ai {
        background-color: var(--accent-orange);
        color: #000;
      }

      .avatar-user {
        background-color: #334155;
        color: var(--text-main);
      }

      .message-bubble {
        background-color: var(--bg-card);
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.95rem;
        line-height: 1.4;
        border: 1px solid var(--border-color);
        word-break: break-word;
      }

      .user-message .message-bubble {
        background-color: #1e3a8a;
        border-color: #3b82f6;
      }

      /* Caixa de Input e Anexos */
      .chat-input-wrapper {
        padding: 12px 16px;
        background-color: var(--bg-dark);
        border-top: 1px solid var(--border-color);
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }

      .file-preview-banner {
        font-size: 0.8rem;
        color: var(--accent-orange);
        margin-bottom: 6px;
        display: none;
        align-items: center;
        gap: 6px;
      }

      .chat-input-container {
        display: flex;
        align-items: center;
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 8px 12px;
        gap: 8px;
      }

      .chat-input-container:focus-within {
        border-color: var(--accent-orange);
      }

      #user-input {
        flex: 1;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 0.95rem;
        resize: none;
        max-height: 120px;
        outline: none;
        padding: 4px 0;
      }

      .input-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .action-icon-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 1.1rem;
        cursor: pointer;
        padding: 4px;
      }

      .action-icon-btn:hover {
        color: var(--text-main);
      }

      .send-submit-btn {
        background-color: var(--accent-orange);
        color: #000;
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
      }

      .send-submit-btn:hover {
        opacity: 0.9;
      }
    </style>
</head>
<body>

    <div class="app-container">
      <!-- Overlay para fechar o menu ao clicar fora -->
      <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

      <!-- Menu Lateral Oculto -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="logo-wrapper">
            <div class="brand-logo">H</div>
            <div>
              <h2>Honey IA</h2>
              <span class="platform-tag">Plataforma Executiva</span>
            </div>
          </div>
          <button class="close-menu-btn" onclick="toggleMenu()">✕</button>
        </div>

        <div class="sidebar-content">
          <div class="section-title">MODO DE ATUAÇÃO</div>
          <nav class="nav-modes">
            <button class="mode-btn active"><span class="icon">🧠</span> Executiva Geral</button>
            <button class="mode-btn"><span class="icon">⚙️</span> Engenharia & Logística</button>
            <button class="mode-btn"><span class="icon">📚</span> Pedagógico & Científico</button>
            <button class="mode-btn"><span class="icon">💻</span> Arquitetura de Software</button>
          </nav>
        </div>
      </aside>

      <!-- Área Principal -->
      <main class="chat-main">
        <header class="chat-topbar">
          <div class="topbar-left">
            <button class="menu-toggle-btn" onclick="toggleMenu()">☰</button>
            <div class="header-titles">
              <h1>Honey IA</h1>
              <p class="subtitle">Pronta para analisar documentos e otimizar processos.</p>
            </div>
          </div>
        </header>

        <div id="chat-messages" class="chat-messages">
          <div class="message ai-message">
            <div class="avatar-ai">H</div>
            <div class="message-bubble">
              Olá! Sou a Honey IA, a tua plataforma executiva de inteligência artificial. Como posso ajudar nos teus projetos ou análises hoje?
            </div>
          </div>
        </div>

        <div class="chat-input-wrapper">
          <div id="file-banner" class="file-preview-banner">📎 Ficheiro anexado pronto para análise</div>
          <div class="chat-input-container">
            <textarea id="user-input" placeholder="Escreve uma mensagem ou anexa um documento..." rows="1" oninput="autoResize(this)"></textarea>
            
            <!-- Input oculto para anexos (PDF, Imagens, Word, Excel) compatível com o teu backend -->
            <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">

            <div class="input-actions">
              <button class="action-icon-btn" title="Anexar Ficheiro" onclick="document.getElementById('file-input').click()">📎</button>
              <button id="send-btn" class="send-submit-btn" onclick="sendMessage()">↑</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let anexoBase64Global = null;
      let mimeTypeGlobal = null;

      function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }

      function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
      }

      function handleFileSelect(event) {
        const file = event.target.files[0];
        const banner = document.getElementById('file-banner');
        if (!file) return;

        mimeTypeGlobal = file.type;
        const reader = new FileReader();
        reader.onload = function(e) {
          // Remove o prefixo data:*/*;base64, para enviar limpo para o teu backend
          const base64String = e.target.result.split(',')[1];
          anexoBase64Global = base64String;
          banner.style.display = 'flex';
          banner.textContent = `📎 Anexado: ${file.name}`;
        };
        reader.readAsDataURL(file);
      }

      async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        const banner = document.getElementById('file-banner');
        
        if (!text && !anexoBase64Global) return;

        const chatMessages = document.getElementById('chat-messages');

        // Renderiza mensagem do utilizador
        chatMessages.innerHTML += `
          <div class="message user-message">
            <div class="avatar-user">U</div>
            <div class="message-bubble">${text || '[Documento Anexado]'}</div>
          </div>
        `;
        
        const payloadPrompt = text;
        const payloadAnexo = anexoBase64Global;
        const payloadMime = mimeTypeGlobal;

        // Limpa inputs
        input.value = '';
        input.style.height = 'auto';
        anexoBase64Global = null;
        mimeTypeGlobal = null;
        document.getElementById('file-input').value = '';
        banner.style.display = 'none';
        
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Indicador de carregamento
        const loadingId = 'loading-' + Date.now();
        chatMessages.innerHTML += `
          <div id="${loadingId}" class="message ai-message">
            <div class="avatar-ai">H</div>
            <div class="message-bubble" style="color: var(--text-muted);">A processar pedido...</div>
          </div>
        `;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const response = await fetch('/gerar-gratis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: payloadPrompt,
              anexoBase64: payloadAnexo,
              mimeType: payloadMime
            })
          });

          const data = await response.json();
          document.getElementById(loadingId).remove();

          const respostaFinal = data.sucesso ? data.resposta : (data.erro || 'Erro ao processar a solicitação.');

          // Renderiza resposta da IA
          chatMessages.innerHTML += `
            <div class="message ai-message">
              <div class="avatar-ai">H</div>
              <div class="message-bubble">${formatarMarkdownSimples(respostaFinal)}</div>
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;

        } catch (err) {
          console.error(err);
          document.getElementById(loadingId).remove();
          chatMessages.innerHTML += `
            <div class="message ai-message">
              <div class="avatar-ai">H</div>
              <div class="message-bubble" style="color: #ef4444;">Erro de conexão com o servidor.</div>
            </div>
          `;
        }
      }

      // Formatador simples para blocos e negritos gerados pela IA
      function formatarMarkdownSimples(texto) {
        return texto
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br>');
      }
    </script>
</body>
</html>
