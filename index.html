<!DOCTYPE html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA — Enterprise Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        honeyGold: '#FFB800', 
                        honeyYellow: '#FFD700',
                        honeyDark: '#080705'
                    }
                }
            }
        }
    </script>

    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            background: #080705;
            color: #FFFFFF; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        /* PADRÃO HEXAGONAL SUTIL (COLMEIA PRO) */
        .honeycomb-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 184, 0, 0.08) 1px, transparent 0);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* AURA AMBIENTE DE ALTA DEFINIÇÃO */
        .ambient-glow {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 184, 0, 0.18) 0%, rgba(255, 120, 0, 0.05) 50%, transparent 75%);
            filter: blur(90px);
            pointer-events: none;
            z-index: 1;
        }

        /* CONTAINER VIDRO HIGH-END */
        .honey-glass {
            background: rgba(18, 16, 12, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 184, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 184, 0, 0.1);
        }

        .honey-glass:focus-within {
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 35px rgba(255, 184, 0, 0.25);
        }

        .text-gradient {
            background: linear-gradient(135deg, #FFFFFF 30%, #FFD700 75%, #FF8800 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative selection:bg-honeyGold selection:text-black">

    <div class="honeycomb-bg"></div>
    <div class="ambient-glow"></div>

    <!-- HEADER ENTERPRISE -->
    <header class="relative z-20 w-full px-5 py-4 flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex items-center gap-3 cursor-pointer" onclick="resetPage()">
            
            <!-- LOGO ABELHA REFINADO -->
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-honeyGold/30 to-transparent border border-honeyGold/50 flex items-center justify-center p-1 shadow-[0_0_20px_rgba(255,184,0,0.3)]">
                <img src="https://img.icons8.com/3d-fluency/94/bee.png" alt="Honey IA Logo" class="w-7 h-7 object-contain">
            </div>

            <div class="flex flex-col">
                <span class="text-base font-black tracking-wider text-white leading-none">HONEY <span class="text-honeyYellow">IA</span></span>
                <span class="text-[9px] font-bold text-honeyGold/80 tracking-widest uppercase mt-0.5">Enterprise Suite</span>
            </div>
        </div>

        <div class="px-3 py-1 rounded-full bg-honeyGold/10 border border-honeyGold/30 text-[11px] font-bold text-honeyYellow flex items-center gap-1.5 shadow-[0_0_12px_rgba(255,184,0,0.15)]">
            <span class="w-1.5 h-1.5 rounded-full bg-honeyYellow animate-pulse"></span>
            <span>Ativo</span>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="relative z-10 flex-1 flex flex-col justify-center items-center px-4 py-4 w-full max-w-xl mx-auto">
        
        <!-- SAUDAÇÃO & TITULO -->
        <div id="hero-section" class="text-center space-y-3 mb-6 transition-all">
            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/[0.04] border border-honeyGold/20 text-honeyGold text-[11px] font-semibold">
                <span>🐝 Sistema de Inteligência Honey</span>
            </div>
            
            <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-white leading-tight">
                Em que podemos <br/>
                <span class="text-gradient">avançar hoje?</span>
            </h1>
            
            <p class="text-xs text-gray-400 max-w-xs mx-auto font-medium leading-relaxed">
                Desenvolvimento fullstack, engenharia de software e inteligência estratégica.
            </p>
        </div>

        <!-- ÁREA DE RESPOSTAS DO CHAT -->
        <div id="chat-stream" class="w-full space-y-4 mb-4 hidden max-h-[50vh] overflow-y-auto no-scrollbar"></div>

        <!-- CONTAINER DA CAIXA DE MENSAGEM -->
        <div class="w-full">
            <form id="ai-form" class="honey-glass rounded-2xl p-3 transition-all">
                
                <!-- BARRA DE MODOS -->
                <div class="flex items-center justify-between pb-2 mb-2 border-b border-white/5 px-1">
                    <select id="mode-selector" class="bg-transparent text-honeyGold text-xs font-bold focus:outline-none cursor-pointer">
                        <option value="dev" class="bg-[#0D0B08] text-white">⚡ Fullstack Dev Engine</option>
                        <option value="designer" class="bg-[#0D0B08] text-white">🎨 UI/UX & Design System</option>
                        <option value="copy" class="bg-[#0D0B08] text-white">✍️ Copywriting & Content</option>
                    </select>

                    <span class="text-[9px] text-gray-500 font-mono tracking-wider">v2.0 PRO</span>
                </div>

                <!-- CAMPO E BOTÃO DE ENVIAR -->
                <div class="flex items-center gap-2">
                    <label for="file-upload" class="p-2 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 cursor-pointer transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                        <input type="file" id="file-upload" class="hidden">
                    </label>

                    <textarea 
                        id="prompt-input" 
                        rows="1" 
                        placeholder="Escreva a sua mensagem para a Honey IA..." 
                        class="w-full bg-transparent text-sm text-white placeholder-gray-500 focus:outline-none resize-none py-1 font-medium"
                    ></textarea>

                    <button 
                        type="submit" 
                        class="p-2.5 rounded-xl bg-gradient-to-r from-honeyGold to-honeyYellow text-black font-extrabold flex items-center justify-center flex-shrink-0 shadow-[0_0_18px_rgba(255,184,0,0.4)] active:scale-95 transition"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                    </button>
                </div>
            </form>

            <!-- ACTION CHIPS REFINADOS -->
            <div id="quick-chips" class="flex items-center justify-center gap-2 mt-3 flex-wrap">
                <button onclick="setPrompt('Criar API Node.js/Express para ')" class="px-3 py-1 rounded-lg bg-white/[0.03] hover:bg-honeyGold/10 border border-white/5 hover:border-honeyGold/30 text-gray-300 hover:text-honeyYellow text-[11px] font-medium transition">
                    ⚡ API Node.js
                </button>
                <button onclick="setPrompt('Criar UI Tailwind responsiva para ')" class="px-3 py-1 rounded-lg bg-white/[0.03] hover:bg-honeyGold/10 border border-white/5 hover:border-honeyGold/30 text-gray-300 hover:text-honeyYellow text-[11px] font-medium transition">
                    🎨 UI Tailwind
                </button>
            </div>
        </div>

    </main>

    <footer class="relative z-20 w-full py-3 text-center text-[10px] text-gray-500 font-medium">
        Honey IA Suite © 2026 — Inteligência de Alto Desempenho
    </footer>

    <script>
        const promptInput = document.getElementById('prompt-input');
        function setPrompt(text) { promptInput.value = text; promptInput.focus(); }
        function resetPage() { 
            document.getElementById('hero-section').classList.remove('hidden'); 
            document.getElementById('chat-stream').classList.add('hidden'); 
        }
    </script>
</body>
</html>
