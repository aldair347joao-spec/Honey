<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey IA | Global Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffb700; --gold-dark: #cc9200; --bg: #08080c; --card: #12121a; --border: #1f1f2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #welcome-screen { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 100px); background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; transition: opacity 0.5s ease; text-align: center; padding: 20px; }
        .hero-bee { font-size: 80px; animation: float 3s ease-in-out infinite; margin-bottom: 20px; display: inline-block; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #welcome-screen h1 { font-size: 36px; color: var(--gold); margin-bottom: 10px; font-weight: 600; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; max-width: 600px; width: 100%; margin: 0 auto; padding-bottom: 120px; }
        .message { padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; max-width: 85%; word-wrap: break-word; white-space: pre-wrap; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
        .honey-msg { background: var(--card); color: #f1f1f6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        
        .audio-play-btn { background: rgba(255, 183, 0, 0.1); border: 1px solid rgba(255, 183, 0, 0.2); color: var(--gold); cursor: pointer; display: inline-flex; align-items: center; margin-top: 12px; padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; gap: 6px; }

        .input-area { position: fixed; bottom: 20px; left: 0; width: 100%; padding: 0 15px; display: flex; justify-content: center; }
        .input-wrapper { max-width: 600px; width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 28px; display: flex; align-items: center; padding: 8px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .chat-input { flex: 1; background: none; border: none; padding: 8px 4px; color: #fff; font-size: 16px; outline: none; }
        .action-btn { background: none; border: none; color: #8a8a9e; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .send-btn { background: var(--gold); color: #000; }
        .recording { color: #ff4a4a !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <span class="hero-bee">🐝</span>
        <h1>Honey IA</h1>
        <p>Your multilingual assistant.</p>
    </div>

    <div class="chat-container" id="chat-box"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <button class="action-btn" id="mic-btn" onclick="alternarGravacao()">🎙️</button>
            <input type="text" class="chat-input" id="user-input" placeholder="Type or speak..." onkeypress="verificarTeclado(event)">
            <button class="action-btn send-btn" id="send-btn" onclick="enviarMensagem()">➤</button>
        </div>
    </div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // Configuração de Voz Multilíngue
    function falarTexto(texto) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const fala = new SpeechSynthesisUtterance(texto);
            
            // Tenta detetar o idioma pelo texto (Podes adicionar mais aqui)
            // Se não detetar, o navegador usa o padrão do sistema
            fala.lang = 'pt-PT'; // Default
            if (texto.match(/hello|you|my|name|what/i)) fala.lang = 'en-US';
            else if (texto.match(/hola|gracias|buenos/i)) fala.lang = 'es-ES';
            else if (texto.match(/bonjour|merci|salut/i)) fala.lang = 'fr-FR';
            else if (texto.match(/ciao|grazie/i)) fala.lang = 'it-IT';

            window.speechSynthesis.speak(fala);
        }
    }

    // Reconhecimento de voz inteligente (aceita qualquer língua configurada no teclado do telemóvel)
    if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = undefined; // Auto-detect baseado no sistema

        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            enviarMensagem();
        };
        
        window.alternarGravacao = () => {
            document.getElementById('mic-btn').classList.add('recording');
            recognition.start();
        };
    }

    async function enviarMensagem() {
        const text = userInput.value.trim();
        if (!text) return;

        document.getElementById('welcome-screen').style.opacity = '0';
        criarBalao(text, 'user-msg');
        userInput.value = "";

        const msgDiv = criarBalao("...", 'honey-msg');
        
        try {
            const res = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            msgDiv.textContent = data.codigo;
            
            const btn = document.createElement('button');
            btn.className = 'audio-play-btn';
            btn.textContent = "🔊 Listen / Ouvir";
            btn.onclick = () => falarTexto(data.codigo);
            msgDiv.appendChild(btn);
        } catch (e) {
            msgDiv.textContent = "Error.";
        }
    }

    function criarBalao(txt, cls) {
        const div = document.createElement('div');
        div.className = `message ${cls}`;
        div.textContent = txt;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }
    
    function verificarTeclado(e) { if (e.key === 'Enter') enviarMensagem(); }
</script>
</body>
</html>
