<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA | Enterprise Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Parser para Markdown e Tabelas -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root { 
            --gold: #ffb700; 
            --gold-dark: #cc9200; 
            --bg: #030305; 
            --card: rgba(14, 14, 22, 0.85); 
            --border: rgba(255, 183, 0, 0.15); 
            --text-main: #f1f1f6;
            --text-muted: #8e8e9f;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100dvh; overflow: hidden; width: 100vw; }
        
        .app-layout { display: flex; width: 100%; height: 100%; position: relative; }
        .chat-section { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative; }
        
        #canvas-3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* HEADER */
        .top-header-controls { position: absolute; top: 18px; left: 18px; right: 18px; z-index: 30; display: flex; justify-content: space-between; pointer-events: none; }
        .top-header-controls * { pointer-events: auto; }
        .icon-btn-header { background: rgba(11, 11, 18, 0.85); border: 1px solid var(--border); width: 42px; height: 42px; border-radius: 12px; color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .auth-trigger-btn { background: rgba(11, 11, 18, 0.85); border: 1px solid var(--border); padding: 0 16px; height: 42px; border-radius: 12px; color: var(--gold); font-size: 13px; font-weight: 600; cursor: pointer; }

        /* MENU LATERAL HISTÓRICO */
        #sidebar-menu { position: fixed; top: 0; left: -100%; width: 100%; max-width: 360px; height: 100%; background: rgba(6, 6, 12, 0.98); border-right: 1px solid var(--border); z-index: 100; transition: left 0.3s ease; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #sidebar-menu.active { left: 0; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; color: #fff; }
        .menu-tab-btn { flex: 1; padding: 8px; font-size: 12px; color: var(--text-muted); background: none; border: none; cursor: pointer; }
        .menu-tab-btn.active { background: var(--gold); color: #000; font-weight: 700; border-radius: 8px; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .history-item { padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; color: #fff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { border-color: var(--gold); }

        /* TABELAS COM SCROLL HORIZONTAL AUTÓNOMO */
        .table-wrapper { width: 100%; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13.5px; }
        th, td { padding: 10px 14px; border-bottom: 1px solid rgba(255,183,0,0.1); white-space: nowrap; }
        th { background: rgba(255,183,0,0.1); color: var(--gold); }

        /* CHAT CONTAINER */
        #welcome-screen { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; }
        .chat-container { flex: 1; overflow-y: auto; padding: 80px 16px 140px 16px; display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 800px; margin: 0 auto; z-index: 5; }
        .row-message { display: flex; flex-direction: column; width: 100%; }
        .row-user { align-items: flex-end; }
        .row-user .msg-body { background: rgba(255, 183, 0, 0.1); border: 1px solid var(--border); padding: 10px 14px; border-radius: 14px; max-width: 85%; }
        .row-honey { align-items: flex-start; }
        .row-honey .msg-body { width: 100%; line-height: 1.6; }
        .preview-img { max-width: 200px; max-height: 150px; border-radius: 8px; margin-top: 6px; border: 1px solid var(--gold); }

        /* INPUT AREA */
        .input-area { position: absolute; bottom: 0; left: 0; width: 100%; padding: 16px; background: linear-gradient(to top, var(--bg) 80%, transparent); z-index: 10; display: flex; flex-direction: column; align-items: center; }
        .input-wrapper { width: 100%; max-width: 720px; background: rgba(11, 11, 18, 0.95); border: 1px solid var(--border); border-radius: 20px; display: flex; align-items: center; padding: 8px 12px; gap: 8px; }
        .chat-input { flex: 1; background: none; border: none; color: #fff; font-size: 14px; outline: none; }
        .send-btn { background: var(--gold); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .file-badge { display: none; background: rgba(255,183,0,0.2); color: var(--gold); font-size: 11px; padding: 4px 8px; border-radius: 6px; margin-bottom: 6px; }
    </style>
</head>
<body>

    <canvas id="canvas-3d"></canvas>

    <div class="top-header-controls">
        <button class="icon-btn-header" onclick="toggleMenu()">☰</button>
        <button class="auth-trigger-btn" id="btn-plan" onclick="alternarPlano()">Plano: Gratuito (Mudar)</button>
    </div>

    <!-- MENU LATERAL -->
    <div id="sidebar-menu">
        <div class="menu-header">
            <h3>🐝 Honey Suite</h3>
            <button onclick="toggleMenu()" style="background:none; border:none; color:#fff; font-size:18px;">✕</button>
        </div>
        <div style="display:flex; gap:5px;">
            <button class="menu-tab-btn active">Histórico</button>
            <button class="menu-tab-btn">Projectos</button>
        </div>
        <div class="history-list" id="history-list">
            <!-- As conversas salvas entram aqui -->
        </div>
    </div>

    <div class="app-layout">
        <div class="chat-section">
            <div id="welcome-screen">
                <h1 style="color:#fff;">Honey IA</h1>
                <p style="color:var(--text-muted); font-size:13px;">Plataforma Executiva & Multimodal</p>
            </div>

            <div class="chat-container" id="chat-box"></div>

            <div class="input-area">
                <div class="file-badge" id="file-badge">📷 Imagem Pronta para envio</div>
                <div class="input-wrapper">
                    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="carregarImagem(event)">
                    <button style="background:none; border:none; color:var(--gold); cursor:pointer;" onclick="document.getElementById('file-input').click()">📎</button>
                    <input type="text" class="chat-input" id="user-input" placeholder="Escreva a sua mensagem..." onkeypress="if(event.key==='Enter') enviarMensagem()">
                    <button class="send-btn" onclick="enviarMensagem()">➔</button>
                </div>
            </div>
        </div>
    </div>

<script>
    let imagemBase64 = null;
    let planoAtual = localStorage.getItem('honey_plan') || 'Gratuito';

    document.getElementById('btn-plan').textContent = `Plano: ${planoAtual}`;

    function toggleMenu() {
        document.getElementById('sidebar-menu').classList.toggle('active');
        carregarHistorico();
    }

    function alternarPlano() {
        planoAtual = planoAtual === 'Gratuito' ? 'Pro (Ilimitado)' : 'Gratuito';
        localStorage.setItem('honey_plan', planoAtual);
        document.getElementById('btn-plan').textContent = `Plano: ${planoAtual}`;
    }

    function carregarImagem(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                imagemBase64 = evt.target.result;
                document.getElementById('file-badge').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    async function enviarMensagem() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text && !imagemBase64) return;

        document.getElementById('welcome-screen').style.display = 'none';

        // Renderiza Mensagem do Utilizador
        const userRow = criarLinha('row-user');
        let htmlUser = text;
        if (imagemBase64) {
            htmlUser += `<br><img src="${imagemBase64}" class="preview-img">`;
        }
        userRow.innerHTML = htmlUser;

        const payloadImagem = imagemBase64;
        input.value = '';
        imagemBase64 = null;
        document.getElementById('file-badge').style.display = 'none';

        // Linha de Resposta da IA
        const honeyRow = criarLinha('row-honey');
        honeyRow.innerHTML = "<em>A processar...</em>";

        try {
            const response = await fetch('/gerar-gratis', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt: text,
                    imagem: payloadImagem, // Envia o Base64 real da Imagem
                    plano: planoAtual
                })
            });

            const data = await response.json();
            
            // Formatador Markdown com suporte a tabelas responsivas
            let conteudoFormatado = marked.parse(data.codigo || data.resposta || "Sem resposta.");
            
            // Envolve todas as tabelas num container com Scroll Horizontal
            conteudoFormatado = conteudoFormatado.replace(/<table>/g, '<div class="table-wrapper"><table>').replace(/<\/table>/g, '</table></div>');
            
            honeyRow.innerHTML = conteudoFormatado;

            // Salva no Histórico
            salvarNoHistorico(text || "Análise de Imagem", conteudoFormatado);

        } catch(err) {
            honeyRow.innerHTML = "Erro de ligação ao servidor.";
        }
    }

    function criarLinha(classe) {
        const row = document.createElement('div');
        row.className = `row-message ${classe}`;
        const body = document.createElement('div');
        body.className = 'msg-body';
        row.appendChild(body);
        document.getElementById('chat-box').appendChild(row);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        return body;
    }

    function salvarNoHistorico(titulo, resposta) {
        let historico = JSON.parse(localStorage.getItem('honey_history')) || [];
        historico.unshift({ id: Date.now(), titulo: titulo, resposta: resposta });
        localStorage.setItem('honey_history', JSON.stringify(historico));
    }

    function carregarHistorico() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        let historico = JSON.parse(localStorage.getItem('honey_history')) || [];
        
        if (historico.length === 0) {
            list.innerHTML = '<p style="color:var(--text-muted); font-size:12px;">Sem conversas gravadas.</p>';
            return;
        }

        historico.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.textContent = item.titulo;
            list.appendChild(div);
        });
    }

    // Three.js Background
    let scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 1, 1000);
    camera.position.z = 400;
    let renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
</script>
</body>
</html>
