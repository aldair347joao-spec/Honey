<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honey IA — Assistente</title>
    <!-- Importação de Tipografia Editorial de Alto Nível (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-base: #030712;
        --bg-sidebar: rgba(11, 15, 23, 0.9);
        --bg-card: rgba(15, 22, 36, 0.85);
        --bg-card-hover: rgba(22, 31, 48, 0.95);
        --accent-amber: #f59e0b;
        --accent-glow: rgba(245, 158, 11, 0.18);
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
        --border-subtle: rgba(255, 255, 255, 0.08);
        --border-active: rgba(245, 158, 11, 0.35);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      body, html {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: var(--bg-base);
        color: var(--text-main);
      }

      .app-container {
        display: flex;
        height: 100dvh;
        width: 100vw;
        position: relative;
        overflow: hidden;
        background: 
          radial-gradient(circle at 15% 15%, rgba(245, 158, 11, 0.14) 0%, transparent 45%),
          radial-gradient(circle at 85% 85%, rgba(29, 78, 216, 0.14) 0%, transparent 45%),
          radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.07) 0%, transparent 60%),
          var(--bg-base);
      }

      /* Menu Lateral */
      .sidebar {
        position: fixed;
        top: 0;
        left: -340px;
        width: 320px;
        height: 100%;
        background-color: var(--bg-sidebar);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        z-index: 1100;
        transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border-subtle);
        box-shadow: 30px 0 80px rgba(0, 0, 0, 0.9);
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(3, 7, 18, 0.8);
        backdrop-filter: blur(8px);
        z-index: 1050;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      .sidebar-header {
        padding: 28px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-subtle);
      }

      .logo-wrapper {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-logo-container {
        position: relative;
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
      }

      .brand-logo-container svg.crown {
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 14px;
        fill: #f59e0b;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
      }

      .brand-logo-container .letter-h {
        font-weight: 800;
        color: #030712;
        font-size: 1.3rem;
      }

      .sidebar-header h2 {
        font-size: 1.1rem;
        font-weight: 700;
      }

      .platform-tag {
        font-size: 0.7rem;
        color: var(--accent-amber);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 700;
      }

      .close-menu-btn {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border-subtle);
        color: var(--text-muted);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-content {
        padding: 20px 16px;
        overflow-y: auto;
        flex: 1;
      }

      .section-title {
        font-size: 0.68rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.12em;
        margin-bottom: 12px;
        margin-top: 12px;
        padding-left: 8px;
      }

      .nav-modes {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .mode-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.01);
        border: 1px solid transparent;
        color: var(--text-muted);
        border-radius: 12px;
        text-align: left;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.25s;
      }

      .mode-btn svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .mode-btn:hover {
        background-color: var(--bg-card-hover);
        color: var(--text-main);
        border-color: var(--border-subtle);
      }

      .mode-btn.active {
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
        color: var(--accent-amber);
        border-color: rgba(245, 158, 11, 0.3);
      }

      .sidebar-footer {
        padding: 20px;
        border-top: 1px solid var(--border-subtle);
        background: rgba(0, 0, 0, 0.2);
      }

      .user-profile-mini {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-avatar-mini {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
        color: #fff;
      }

      .user-info-mini h4 { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
      .user-info-mini span { font-size: 0.72rem; color: var(--text-muted); font-weight: 500; }

      /* Área Principal */
      .chat-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        position: relative;
      }

      .chat-topbar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
        background: transparent;
      }

      .menu-toggle-btn {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        color: var(--text-main);
        width: 44px;
        height: 44px;
        border-radius: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      }
      .menu-toggle-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

      .topbar-user-badge {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        padding: 6px 14px;
        border-radius: 12px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-main);
        backdrop-filter: blur(12px);
      }

      /* Estado Inicial Hero */
      .hero-welcome-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        transition: opacity 0.3s ease;
      }

      .hero-welcome-state.hidden {
        display: none;
      }

      .hero-title {
        font-size: clamp(2.2rem, 5vw, 3.2rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        margin-bottom: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero-subtitle {
        font-size: 1.02rem;
        color: var(--text-muted);
        max-width: 500px;
        margin-bottom: 36px;
        line-height: 1.6;
        font-weight: 500;
      }

      /* Caixa de Input */
      .input-wrapper-container {
        width: 100%;
        max-width: 740px;
        margin: 0 auto;
        padding: 0 16px;
      }

      .chat-input-card {
        background-color: var(--bg-card);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-subtle);
        border-radius: 22px;
        padding: 14px 16px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        transition: border-color 0.25s, box-shadow 0.25s;
      }

      .chat-input-card:focus-within {
        border-color: var(--accent-amber);
        box-shadow: 0 0 0 2px var(--accent-glow), 0 20px 50px rgba(0,0,0,0.8);
      }

      .user-input-field {
        width: 100%;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 1rem;
        font-weight: 500;
        resize: none;
        max-height: 140px;
        outline: none;
        line-height: 1.5;
        margin-bottom: 10px;
      }

      .user-input-field::placeholder {
        color: var(--text-muted);
        opacity: 0.65;
      }

      .card-bottom-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 12px;
      }

      .left-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tool-icon-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        width: 36px;
        height: 36px;
        border-radius: 10px;
        cursor: pointer;
        transition: color 0.2s, background 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .tool-icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .tool-icon-btn:hover { color: var(--text-main); background-color: rgba(255, 255, 255, 0.06); }
      .tool-icon-btn.recording { color: #ef4444; background-color: rgba(239, 68, 68, 0.15); }

      .send-submit-btn {
        background-color: var(--accent-amber);
        color: #030712;
        border: none;
        width: 38px;
        height: 38px;
        border-radius: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.15s ease, opacity 0.2s ease;
        box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
      }
      .send-submit-btn svg { width: 18px; height: 18px; stroke: #030712; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .send-submit-btn:hover { opacity: 0.92; transform: scale(1.05); }

      .file-preview-banner {
        font-size: 0.8rem;
        color: var(--accent-amber);
        background-color: var(--accent-glow);
        border: 1px solid rgba(245, 158, 11, 0.25);
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        display: none;
        align-items: center;
        justify-content: space-between;
        font-weight: 500;
      }

      /* Container de Conversa (Estilo ChatGPT - Balões Fluidos) */
      .chat-messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 95px 16px 20px 16px;
        display: none;
        flex-direction: column;
        gap: 20px;
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
      }

      .chat-messages-container.active {
        display: flex;
      }

      /* Pergunta do Utilizador (Alinhada à direita) */
      .user-msg-row {
        display: flex;
        justify-content: flex-end;
        width: 100%;
      }

      .user-bubble {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #ffffff;
        padding: 12px 18px;
        border-radius: 18px 18px 4px 18px;
        font-size: 0.95rem;
        font-weight: 500;
        max-width: 75%;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(29, 78, 216, 0.25);
      }

      /* Resposta da IA (Estilo Chat - Alinhada à esquerda com pequeno avatar/ícone) */
      .ai-msg-row {
        display: flex;
        gap: 12px;
        width: 100%;
        align-items: flex-start;
      }

      .ai-avatar-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
      }
      .ai-avatar-icon svg { width: 16px; height: 16px; fill: #030712; }

      .ai-bubble {
        background-color: var(--bg-card);
        border: 1px solid var(--border-subtle);
        color: #e5e7eb;
        padding: 14px 18px;
        border-radius: 4px 18px 18px 18px;
        font-size: 0.96rem;
        line-height: 1.6;
        max-width: 85%;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        font-weight: 400;
      }

      .ai-bubble p { margin-bottom: 10px; }
      .ai-bubble p:last-child { margin-bottom: 0; }
      .ai-bubble code {
        background-color: rgba(0, 0, 0, 0.5);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        color: #fbbf24;
        font-size: 0.88rem;
      }
      .ai-bubble pre {
        background-color: #010307;
        padding: 12px;
        border-radius: 10px;
        overflow-x: auto;
        margin: 10px 0;
        border: 1px solid var(--border-subtle);
      }

      .active-chat-footer {
        display: none;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding: 16px;
      }
      .active-chat-footer.active {
        display: block;
      }
    </style>
</head>
<body>

    <div class="app-container">
      <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleMenu()"></div>

      <!-- Menu Lateral -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="logo-wrapper">
            <div class="brand-logo-container">
              <svg class="crown" viewBox="0 0 24 24"><path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5m14 3a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-1h14v1Z"/></svg>
              <span class="letter-h">H</span>
            </div>
            <div>
              <h2>Honey IA</h2>
              <span class="platform-tag">Assistente</span>
            </div>
          </div>
          <button class="close-menu-btn" onclick="toggleMenu()">✕</button>
        </div>

        <div class="sidebar-content">
          <div class="section-title">MODOS DE ATUAÇÃO</div>
          <nav class="nav-modes">
            <button class="mode-btn active" onclick="selectMode(this)">
              <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8Z"/><path d="M12 6v6l4 2"/></svg>
              Geral
            </button>
            <button class="mode-btn" onclick="selectMode(this)">
              <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"/></svg>
              Engenharia & Logística
            </button>
            <button class="mode-btn" onclick="selectMode(this)">
              <svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6 6h10M6 10h10"/></svg>
              Pedagógico & Científico
            </button>
            <button class="mode-btn" onclick="selectMode(this)">
              <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              Arquitetura de Software
            </button>
          </nav>
        </div>

        <div class="sidebar-footer">
          <div class="user-profile-mini">
            <div class="user-avatar-mini">A</div>
            <div class="user-info-mini">
              <h4>Aldair</h4>
              <span>Sessão Ativa</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Área Principal -->
      <main class="chat-main">
        <header class="chat-topbar">
          <button class="menu-toggle-btn" onclick="toggleMenu()" title="Abrir Menu">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <div class="topbar-user-badge">Aldair</div>
        </header>

        <!-- 1. Estado Inicial Hero -->
        <div id="hero-state" class="hero-welcome-state">
          <h1 class="hero-title">Onde as ideias começam</h1>
          <p class="hero-subtitle">Como posso ajudar-te hoje?</p>
          
          <div class="input-wrapper-container">
            <div id="file-banner-hero" class="file-preview-banner">
              <span id="file-banner-text-hero">📎 Ficheiro anexado</span>
              <span onclick="removeFile()" style="cursor: pointer; font-weight: bold;">✕</span>
            </div>
            <div class="chat-input-card">
              <textarea id="user-input-hero" class="user-input-field" placeholder="Escreve uma mensagem..." rows="1" oninput="autoResize(this)" onkeydown="checkSubmit(event)"></textarea>
              
              <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">

              <div class="card-bottom-actions">
                <div class="left-actions">
                  <button class="tool-icon-btn" title="Anexar Ficheiro" onclick="document.getElementById('file-input').click()">
                    <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  </button>
                  <button id="mic-btn-hero" class="tool-icon-btn" title="Conversa por Áudio" onclick="toggleVoiceRecording()">
                    <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                  </button>
                </div>
                <button class="send-submit-btn" onclick="sendMessage()" title="Enviar">
                  <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 2. Estado de Chat Ativo (Estilo ChatGPT) -->
        <div id="chat-messages" class="chat-messages-container"></div>

        <div id="active-footer" class="active-chat-footer">
          <div id="file-banner-footer" class="file-preview-banner">
            <span id="file-banner-text-footer">📎 Ficheiro anexado</span>
            <span onclick="removeFile()" style="cursor: pointer; font-weight: bold;">✕</span>
          </div>
          <div class="chat-input-card">
            <textarea id="user-input-footer" class="user-input-field" placeholder="Escreve uma mensagem..." rows="1" oninput="autoResize(this)" onkeydown="checkSubmit(event)"></textarea>
            <div class="card-bottom-actions">
              <div class="left-actions">
                <button class="tool-icon-btn" title="Anexar Ficheiro" onclick="document.getElementById('file-input').click()">
                  <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                </button>
                <button id="mic-btn-footer" class="tool-icon-btn" title="Conversa por Áudio" onclick="toggleVoiceRecording()">
                  <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
              </div>
              <button class="send-submit-btn" onclick="sendMessage()" title="Enviar">
                <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let anexoBase64Global = null;
      let mimeTypeGlobal = null;
      let chatStarted = false;
      let isRecording = false;

      function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
      }

      function selectMode(btn) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        toggleMenu();
      }

      function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 130) + 'px';
        const otherId = textarea.id === 'user-input-hero' ? 'user-input-footer' : 'user-input-hero';
        const otherEl = document.getElementById(otherId);
        if (otherEl) {
          otherEl.value = textarea.value;
          otherEl.style.height = textarea.style.height;
        }
      }

      function checkSubmit(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function toggleVoiceRecording() {
        isRecording = !isRecording;
        const micBtns = [document.getElementById('mic-btn-hero'), document.getElementById('mic-btn-footer')];
        micBtns.forEach(btn => {
          if (!btn) return;
          if (isRecording) {
            btn.classList.add('recording');
            btn.title = "A gravar áudio...";
          } else {
            btn.classList.remove('recording');
            btn.title = "Conversa por Áudio";
          }
        });
      }

      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        mimeTypeGlobal = file.type;
        const reader = new FileReader();
        reader.onload = function(e) {
          anexoBase64Global = e.target.result.split(',')[1];
          ['file-banner-hero', 'file-banner-footer'].forEach(id => {
            const b = document.getElementById(id);
            if(b) b.style.display = 'flex';
          });
          ['file-banner-text-hero', 'file-banner-text-footer'].forEach(id => {
            const t = document.getElementById(id);
            if(t) t.textContent = `📎 Anexado: ${file.name}`;
          });
        };
        reader.readAsDataURL(file);
      }

      function removeFile() {
        anexoBase64Global = null;
        mimeTypeGlobal = null;
        document.getElementById('file-input').value = '';
        ['file-banner-hero', 'file-banner-footer'].forEach(id => {
          const b = document.getElementById(id);
          if(b) b.style.display = 'none';
        });
      }

      async function sendMessage() {
        const activeInputId = chatStarted ? 'user-input-footer' : 'user-input-hero';
        const input = document.getElementById(activeInputId);
        const text = input.value.trim();

        if (!text && !anexoBase64Global) return;

        if (!chatStarted) {
          chatStarted = true;
          document.getElementById('hero-state').classList.add('hidden');
          document.getElementById('chat-messages').classList.add('active');
          document.getElementById('active-footer').classList.add('active');
        }

        const chatMessages = document.getElementById('chat-messages');

        // Adiciona mensagem do utilizador (Alinhada à direita)
        chatMessages.innerHTML += `
          <div class="user-msg-row">
            <div class="user-bubble">${escapeHtml(text) || '[Documento Anexado]'}</div>
          </div>
        `;

        const payloadPrompt = text;
        const payloadAnexo = anexoBase64Global;
        const payloadMime = mimeTypeGlobal;

        document.getElementById('user-input-hero').value = '';
        document.getElementById('user-input-footer').value = '';
        document.getElementById('user-input-hero').style.height = 'auto';
        document.getElementById('user-input-footer').style.height = 'auto';
        removeFile();

        chatMessages.scrollTop = chatMessages.scrollHeight;

        const loadingId = 'loading-' + Date.now();
        chatMessages.innerHTML += `
          <div id="${loadingId}" class="ai-msg-row">
            <div class="ai-avatar-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <div class="ai-bubble" style="color: var(--text-muted);">A pensar...</div>
          </div>
        `;
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const response = await fetch('/gerar-gratis', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt: payloadPrompt,
              anexoBase64: payloadAnexo,
              mimeType: payloadMime
            })
          });

          const data = await response.json();
          const loadingEl = document.getElementById(loadingId);
          if (loadingEl) loadingEl.remove();

          const respostaFinal = data.sucesso ? data.resposta : (data.erro || 'Erro ao processar a solicitação.');

          // Adiciona resposta da IA (Estilo Chat / Balão)
          chatMessages.innerHTML += `
            <div class="ai-msg-row">
              <div class="ai-avatar-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="ai-bubble">${renderizarMarkdown(respostaFinal)}</div>
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;

        } catch (err) {
          console.error(err);
          const loadingEl = document.getElementById(loadingId);
          if (loadingEl) loadingEl.remove();
          chatMessages.innerHTML += `
            <div class="ai-msg-row">
              <div class="ai-avatar-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </div>
              <div class="ai-bubble" style="color: #ef4444;">Erro de conexão com o servidor.</div>
            </div>
          `;
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      }

      function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function renderizarMarkdown(texto) {
        let safeText = escapeHtml(texto);
        safeText = safeText.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        safeText = safeText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        safeText = safeText.replace(/\*(.*?)\*/g, '<em>$1</em>');
        safeText = safeText.replace(/\n/g, '<br>');
        return safeText;
      }
    </script>
</body>
</html>
